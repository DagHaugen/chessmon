<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#15171c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>chessmon clock</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;
    --accent:#4f8cff;--good:#3ecf8e;--warn:#ffb454;--bad:#ff6b6b;--lt:#d9c4a3;--dk:#5b6472;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .page{max-width:520px;margin:0 auto;padding:6px 34px;min-height:100dvh;display:flex;flex-direction:column;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--bad);flex:0 0 auto}
  .dot.on{display:none}                              /* only show the dot (red) when the connection drops */
  .side{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;
    display:flex;align-items:center;justify-content:space-between;transition:.15s;opacity:.5}
  .side.active{opacity:1;border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .side.win{opacity:1;border-color:var(--good);box-shadow:0 0 0 1px var(--good)}
  .nm{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
  .tm{font-variant-numeric:tabular-nums;font-weight:700;font-size:42px;line-height:1}
  .tm.low{color:var(--warn)} .tm.flag{color:var(--bad)}
  .board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
    aspect-ratio:1;width:100%;border-radius:6px;overflow:hidden}
  .board.m1{transform:rotate(-90deg)}                         /* mode 1: board turned -90 (pieces too) */
  .board.m2 .sq.bp{transform:rotate(180deg)}                  /* mode 2: black pieces face the black side */
  .sq{display:flex;align-items:center;justify-content:center;font-size:min(8.5vw,36px);line-height:1;color:#1a1a1a}
  .sq.l{background:#ffffff} .sq.d{background:#d9d9d9}
  .sq.l.last{background:#f6edab} .sq.d.last{background:#e3d680}   /* last move from/to */
  .sq.l.bad{background:#f2a6a6} .sq.d.bad{background:#dd8585}     /* an illegal move's squares */
  .sq .pc{width:86%;height:86%;display:block;pointer-events:none}
  #game{display:flex;flex-direction:row;flex:1;min-height:0;gap:8px;position:relative}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;gap:6px}   /* col 3 */
  .zone{flex:1;display:flex;flex-direction:column;min-height:0;gap:6px}
  .zone.black{transform:rotate(180deg)}
  .zone .act{flex:1;min-height:0;position:relative}        /* fixed box; contents fill it, never resize it */
  .cbtn{position:absolute;inset:0;width:100%;height:100%;appearance:none;border:2px solid transparent;border-radius:16px;
    font-size:min(16vw,88px);font-weight:700;line-height:1;cursor:pointer;color:#08110a;background:var(--good);transition:.12s}
  .cbtn.go{background:var(--good);border-color:var(--good);color:#08110a}
  .cbtn.off{background:var(--panel);border-color:var(--line);color:transparent;cursor:default}  /* blank when not your move */
  .cbtn.reading{background:var(--panel);border-color:var(--line);color:var(--mut);cursor:default}
  .cbtn.warn{background:#3a2226;border-color:var(--bad);color:var(--bad);font-size:min(7.5vw,27px);
    line-height:1.2;white-space:pre-line;padding:6px;letter-spacing:.01em}
  .cbtn:not(:disabled):active{transform:translateY(1px)}
  .cstrip{flex:0 0 46px;align-self:center;display:flex;flex-direction:column;align-items:center;justify-content:space-between;   /* col 2; height synced to the board (JS) */
    padding:2px 0}
  .cstrip .ct{writing-mode:vertical-rl;transform:rotate(180deg);font-variant-numeric:tabular-nums;font-weight:700;font-size:23px;color:var(--ink);letter-spacing:.02em}
  .cstrip .ct.low{color:var(--warn)} .cstrip .ct.flag{color:var(--bad)}        /* all three read from the right side */
  .cstrip .ctname{writing-mode:vertical-rl;transform:rotate(180deg);font-size:14px;color:var(--ink);font-weight:600;letter-spacing:.04em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:0}
  .boardwrap{position:relative;flex:0 1 auto;width:min(54dvh,100%);aspect-ratio:1;margin:0 auto}
  .startov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(21,23,28,.6);border:none;border-radius:8px;cursor:pointer;z-index:4}
  .startov span{transform:rotate(-90deg);font-size:min(13vw,64px);font-weight:800;color:var(--good);letter-spacing:.14em}
  .rotbtn{position:absolute;top:50%;left:50%;transform:translate(calc(-50% - 82px),-50%);z-index:5;   /* centered vertically, just left of START */
    width:42px;height:42px;border-radius:50%;line-height:1;
    background:rgba(21,23,28,.85);border:1px solid var(--line);color:var(--ink);font-size:22px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}   /* START-screen orientation toggle */
  .rail{position:fixed;left:0;top:0;bottom:0;width:32px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:9px;z-index:6;padding:8px 0}
  .rail button{writing-mode:vertical-rl;transform:rotate(180deg);background:rgba(29,32,38,.92);border:1px solid var(--line);color:var(--mut);
    border-radius:9px 0 0 9px;padding:13px 5px;font-size:11px;font-weight:600;letter-spacing:.06em;cursor:pointer}
  .rrail{position:fixed;right:0;top:0;bottom:0;width:32px;display:flex;align-items:center;justify-content:center;z-index:6;padding:8px 0}
  .rrail .report{writing-mode:vertical-rl;transform:rotate(180deg);background:none;border:none;padding:0;
    font-size:14px;max-height:94%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}  /* col 4, faces the board */
  .btn{appearance:none;border:none;border-radius:14px;font-size:19px;font-weight:700;padding:18px;
    width:100%;cursor:pointer;color:#0b1020;background:var(--good)}
  .btn:active{transform:translateY(1px)} .btn[disabled]{opacity:.4}
  .ph{color:var(--mut);font-size:14px;text-align:center}
  .act .cands{position:absolute;inset:0;display:none;flex-direction:column;gap:6px}  /* candidates fill the box */
  .act.resolving .cbtn{display:none}
  .act.resolving .cands{display:flex}
  .chead{flex:0 0 auto;color:var(--bad);font-size:13px;font-weight:600;text-align:center}
  .cgrid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:6px;grid-auto-rows:1fr}
  .cand{width:100%;height:100%;background:#262b34;border:1px solid var(--accent);color:var(--ink);
    border-radius:11px;font-size:18px;font-weight:600;cursor:pointer}
  .cand:active{transform:translateY(1px)}
  .report{background:#11141a;border:1px solid var(--line);border-radius:11px;padding:10px;font-size:13px;
    text-align:center;color:var(--mut)} .report.over{color:var(--good);font-weight:600}
  .report.warn{color:var(--warn);border-color:var(--warn);font-weight:600}
  .pair{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .pair h2{font-size:13px;color:var(--mut);margin:0 0 10px;text-transform:uppercase;letter-spacing:.1em}
  #qr{display:flex;justify-content:center;margin:0 auto;width:160px;height:160px;background:#fff;
    border-radius:10px;padding:8px}
  .pair code{display:block;margin-top:10px;color:var(--accent);font-size:13px;word-break:break-all}
  .calib{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .calib h2{font-size:13px;color:var(--mut);margin:0;text-transform:uppercase;letter-spacing:.08em}
  .calib p{font-size:12px;color:var(--mut);margin:4px 0 10px}
  .cwrap{position:relative;display:inline-block;max-width:100%;line-height:0;
    touch-action:none;user-select:none;-webkit-user-select:none}
  .cwrap img{display:block;max-width:100%;border-radius:8px}
  .cmark{position:absolute;width:40px;height:40px;margin:-20px 0 0 -20px;border-radius:50%;
    border:2px solid #46d369;background:rgba(70,211,105,.12);cursor:pointer;touch-action:none}
  .cmark::before,.cmark::after{content:'';position:absolute;background:#46d369}
  .cmark::before{left:50%;top:4px;bottom:4px;width:2px;margin-left:-1px}
  .cmark::after{top:50%;left:4px;right:4px;height:2px;margin-top:-1px}
  .cmark.sel{border-color:#ffd23f;background:rgba(255,210,63,.22);box-shadow:0 0 0 3px rgba(255,210,63,.3)}
  .cmark.sel::before,.cmark.sel::after{background:#ffd23f}
  .calib .btn{margin-top:12px}
  .calib.orienting .cmark{display:none}
  .oside{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .obtn{background:#262b34;border:1px solid var(--accent);color:var(--ink);border-radius:11px;
    padding:14px 8px;font-size:15px;font-weight:600;cursor:pointer}
  .obtn:active{transform:translateY(1px)}
  .hidden{display:none}
  .setup{margin:auto;text-align:center}
  .setup .btn{background:var(--accent);color:#fff;max-width:240px}
</style>
</head>
<body>
<div class="page">
  <div class="rail" id="rail">
    <span class="dot" id="dot"></span>
    <button id="refreshbtn" class="hidden">↻ Resnap</button>
    <button id="undobtn" class="hidden">↶ Undo</button>
    <button id="pausebtn" class="hidden">Pause</button>
    <button id="resetbtn" class="hidden">Reset</button>
  </div>
  <div class="rrail"><span class="report" id="report"></span></div>

  <div class="pair hidden" id="pair">
    <h2>Scan with the camera phone</h2>
    <div id="qr"></div>
    <code id="paircode"></code>
  </div>

  <div class="calib hidden" id="calib">
    <h2 id="ctitle">Mark the board corners</h2>
    <p id="chint">Tap a corner (turns yellow), then drag anywhere on the image to nudge it — your finger stays off the corner. Tap again to lock.</p>
    <div class="cwrap" id="cwrap">
      <img id="cimg" alt="board from the camera">
      <div class="cmark"></div><div class="cmark"></div><div class="cmark"></div><div class="cmark"></div>
    </div>
    <button class="btn" id="cdone">Use these corners</button>
    <div class="oside hidden" id="oside">
      <button class="obtn" data-side="top">▲ Top</button><button class="obtn" data-side="bottom">▼ Bottom</button>
      <button class="obtn" data-side="left">◀ Left</button><button class="obtn" data-side="right">Right ▶</button>
    </div>
  </div>

  <div class="setup hidden" id="setup">
    <p class="ph">No table yet.<br>Pair this device from the chessmon console.</p>
  </div>

  <div id="game" class="hidden">
    <div class="cstrip">                                <!-- col 2: clocks + table, sized to the board height -->
      <span class="ct" id="st-black">5:00</span>
      <span class="ctname" id="tid"></span>
      <span class="ct" id="st-white">5:00</span>
    </div>
    <div class="main">                                  <!-- col 3: zones (clocks + buttons) + board -->
      <div class="zone black" id="z-black">
        <div class="side" id="s-black"><span class="nm">Black</span><span class="tm" id="t-black">5:00</span></div>
        <div class="act" id="act-black"><button class="cbtn off" id="cb-black" disabled></button><div class="cands" id="cands-black"></div></div>
      </div>
      <div class="boardwrap">
        <div class="board" id="board"></div>
        <button class="startov hidden" id="startov"><span>START</span></button>
        <button class="rotbtn hidden" id="rotbtn" title="Rotate the board (lock in at start)">⟳</button>
      </div>
      <div class="zone white" id="z-white">
        <div class="side" id="s-white"><span class="nm">White</span><span class="tm" id="t-white">5:00</span></div>
        <div class="act" id="act-white"><button class="cbtn off" id="cb-white" disabled></button><div class="cands" id="cands-white"></div></div>
      </div>
    </div>
  </div>

</div>

<script src="qrcode.min.js"></script>
<script>
const GLYPH={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
const params=new URLSearchParams(location.search);
let table=params.get('table')||localStorage.getItem('cm_table');
if(table)localStorage.setItem('cm_table',table);     // reopen rejoins the last table — no new QR/scan
let devId=localStorage.getItem('cm_devid');          // a stable per-device id for the server console
if(!devId){devId=(crypto.randomUUID&&crypto.randomUUID())||('d'+Date.now().toString(36)+Math.random().toString(36).slice(2));localStorage.setItem('cm_devid',devId)}
function deviceName(){const u=navigator.userAgent;
  if(/iPhone/.test(u))return'iPhone';
  if(/iPad/.test(u)||(/Macintosh/.test(u)&&navigator.maxTouchPoints>1))return'iPad';
  if(/Android/.test(u))return/Mobile/.test(u)?'Android phone':'Android tablet';
  if(/Macintosh/.test(u))return'Mac';if(/Windows/.test(u))return'Windows PC';return'device'}
const devName=deviceName();
let ws,started=false,wakeLock=null,camLinked=false,lastMove=null,phase='setup',clk={white:300000,black:300000,active:'white',running:false,last:Date.now()};
let rotMode=(+localStorage.getItem('cm_rot')||0)%3;        // 0 = normal · 1 = board -90 · 2 = black pieces 180
function applyRot(){$('board').className='board m'+rotMode}

function $(id){return document.getElementById(id)}
function show(id,on){$(id).classList.toggle('hidden',!on)}
function fmt(ms){ms=Math.max(0,ms);const s=Math.round(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

function renderBoard(fen){
  const b=$('board');b.innerHTML='';
  const rows=(fen||'8/8/8/8/8/8/8/8').split(' ')[0].split('/');
  rows.forEach((row,r)=>{let c=0;for(const ch of row){
    if(/\d/.test(ch)){for(let i=0;i<+ch;i++){b.appendChild(mkSq(r,c++,''))}}
    else{b.appendChild(mkSq(r,c++,ch))}}});
}
function sqRC(s){return [8-(+s[1]),s.charCodeAt(0)-97]}     // 'e2' -> [row,col] (row 0 = rank 8)
function isLast(r,c){if(!lastMove)return false;const f=sqRC(lastMove.from),t=sqRC(lastMove.to);
  return (r===f[0]&&c===f[1])||(r===t[0]&&c===t[1])}
function mkSq(r,c,ch){const d=document.createElement('div');d.className='sq '+((r+c)%2?'d':'l');
  if(isLast(r,c))d.classList.add('last');
  if(ch){if(ch>='a')d.classList.add('bp');                              // black piece -> rotatable in mode 2
    const i=document.createElement('img');i.className='pc';i.alt=ch;
    i.onerror=()=>{i.remove();d.textContent=GLYPH[ch]};                  // fall back to the glyph
    i.src='pieces/'+(ch<'a'?'w':'b')+ch.toUpperCase()+'.svg';d.appendChild(i)}return d}
function markBad(squares){$('board').querySelectorAll('.sq.bad').forEach(s=>s.classList.remove('bad'));   // flag illegal squares red
  (squares||[]).forEach(sq=>{const r=8-(+sq[1]),c=sq.charCodeAt(0)-97,cell=$('board').children[r*8+c];if(cell)cell.classList.add('bad')})}
function showUndo(on){show('undobtn',on)}

function renderClocks(){
  for(const c of ['white','black']){const ms=clk[c],txt=fmt(ms),cls=(ms<=0?' flag':(ms<30000?' low':''));
    $('t-'+c).textContent=txt;$('t-'+c).className='tm'+cls;
    const st=$('st-'+c);if(st){st.textContent=txt;st.className='ct'+cls}}    // duplicate into the side strip
  $('s-white').classList.toggle('active',clk.active==='white'&&clk.running);
  $('s-black').classList.toggle('active',clk.active==='black'&&clk.running);
}
setInterval(()=>{const now=Date.now();
  if(clk.running){clk[clk.active]-=now-clk.last;if(clk[clk.active]<=0){clk[clk.active]=0;onFlag()}}
  clk.last=now;renderClocks()},100);
function onFlag(){phase='over';clk.running=false;showCtrls(false);show('resetbtn',true);showUndo(false);const loser=clk.active,winner=loser==='white'?'black':'white';
  $('s-'+winner).classList.add('win');$('report').className='report over';
  $('report').textContent='flag — '+winner+' wins on time';paint();
  send({type:'flag',side:loser});}                       // loss on time -> server ends the game

let reading=false, warnMsg=null;
function paint(){                                          // big ✓ for the side to move; blank for the other
  for(const side of ['white','black']){
    const b=$('cb-'+side),active=clk.active===side&&phase==='run';let cls='cbtn off',txt='',dis=true;
    if(active&&warnMsg){cls='cbtn warn';txt=warnMsg;dis=false}        // bad read -> red, message in the button
    else if(active&&reading){cls='cbtn reading';txt='✓'}             // confirmed, reading the board
    else if(active){cls='cbtn go';txt='✓';dis=false}                // your move -> green check
    b.className=cls;b.textContent=txt;b.disabled=dis;}
}
function clearCands(){for(const s of ['white','black']){$('cands-'+s).innerHTML='';$('act-'+s).classList.remove('resolving')}}
function showCands(cands){const c=$('cands-'+clk.active);c.innerHTML='';     // candidates fill the fixed box
  const h=document.createElement('div');h.className='chead';h.textContent=warnMsg||'pick your move:';c.appendChild(h);
  const g=document.createElement('div');g.className='cgrid';
  (cands||[]).forEach(x=>{const b=document.createElement('button');b.className='cand';b.textContent=x.san;
    b.onclick=()=>{if(x.uci){send({type:'move.resolve',uci:x.uci});warnMsg=null;reading=true;clearCands();paint()}};g.appendChild(b)});
  c.appendChild(g);$('act-'+clk.active).classList.add('resolving')}
function showCtrls(on){show('pausebtn',on);show('resetbtn',on)}
function enterReady(){phase='ready';clk.running=false;reading=false;warnMsg=null;show('startov',true);show('rotbtn',true);showCtrls(false);showUndo(false);clearCands();paint();renderClocks()}
function startGame(){phase='run';clk.active='white';clk.running=true;clk.last=Date.now();reading=false;warnMsg=null;
  show('startov',false);show('rotbtn',false);showCtrls(true);showUndo(false);$('pausebtn').textContent='Pause';clearCands();paint();goFullscreen()}
function goFullscreen(){const e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen().catch(()=>{})}
function togglePause(){
  if(phase==='run'){phase='paused';clk.running=false;$('pausebtn').textContent='Resume';paint()}
  else if(phase==='paused'){phase='run';clk.running=true;clk.last=Date.now();$('pausebtn').textContent='Pause';paint()}}
function resetGame(){phase='ready';clk.white=clk.black=300000;clk.active='white';clk.running=false;reading=false;warnMsg=null;
  lastMove=null;renderBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR');send({type:'game.reset'});   // pieces are back at start
  $('s-white').classList.remove('win');$('s-black').classList.remove('win');
  showCtrls(false);show('startov',true);show('rotbtn',true);showUndo(false);clearCands();paint();renderClocks();
  $('report').className='report';$('report').textContent='Ready — press START'}
function ph(txt){const d=document.createElement('div');d.className='ph';d.textContent=txt;return d}
['white','black'].forEach(side=>$('cb-'+side).onclick=()=>{   // confirm, or retry after a warning
  if(clk.active!==side||phase!=='run')return;
  warnMsg=null;reading=true;clk.running=false;clearCands();
  send({type:'move.confirm',side,clockWhite:Math.round(clk.white),clockBlack:Math.round(clk.black)});paint()});

let selMark=null;
function selectMark(m){if(selMark)selMark.classList.remove('sel');selMark=m;if(m)m.classList.add('sel')}
function showCalib(durl){
  const img=$('cimg');selectMark(null);
  $('calib').classList.remove('orienting');show('oside',false);show('cdone',true);   // back to corner mode
  $('ctitle').textContent='Mark the board corners';
  $('chint').textContent='Tap a corner (turns yellow), then drag anywhere on the image to nudge it. Tap again to lock.';
  img.onload=()=>{const pos=[[.12,.12],[.88,.12],[.88,.88],[.12,.88]];   // TL,TR,BR,BL insets to start
    document.querySelectorAll('.cmark').forEach((m,i)=>{m.style.left=(pos[i][0]*100)+'%';m.style.top=(pos[i][1]*100)+'%'});};
  img.src=durl;show('pair',false);show('calib',true);$('report').textContent='tap a corner, then drag to place it';
}
function showOrient(){                                       // corners done, start is symmetric -> ask White's side
  $('calib').classList.add('orienting');show('cdone',false);show('oside',true);
  $('ctitle').textContent='Which side is White on?';
  $('chint').textContent='Tap the side of the image where the white pieces are.';
}
(function(){                                                   // tap a marker -> select (yellow); then a drag
  let active=false,down=null,dragM=null,sx=0,sy=0,lx=0,ly=0,moved=false;  // ANYWHERE on the image nudges it
  const pt=e=>e.touches?e.touches[0]:e;                        // (relative move -> finger never covers the corner)
  function onDown(e){
    if($('calib').classList.contains('hidden')||!e.target.closest('#cwrap'))return;
    const p=pt(e);active=true;sx=lx=p.clientX;sy=ly=p.clientY;moved=false;
    down=e.target.closest('.cmark');dragM=down||selMark;      // touched marker, else the selected one
    e.preventDefault();
  }
  function onMove(e){
    if(!active)return;const p=pt(e);const dx=p.clientX-lx,dy=p.clientY-ly;lx=p.clientX;ly=p.clientY;
    if(Math.abs(p.clientX-sx)>4||Math.abs(p.clientY-sy)>4)moved=true;
    if(moved&&dragM){
      if(dragM!==selMark)selectMark(dragM);
      const r=$('cimg').getBoundingClientRect(),b=dragM.getBoundingClientRect();
      const cx=Math.max(0,Math.min(r.width,b.left+b.width/2-r.left+dx)),
            cy=Math.max(0,Math.min(r.height,b.top+b.height/2-r.top+dy));
      dragM.style.left=(cx/r.width*100)+'%';dragM.style.top=(cy/r.height*100)+'%';
    }
    e.preventDefault();
  }
  function onUp(){
    if(active&&!moved)selectMark(down?(down===selMark?null:down):null);   // tap: toggle / switch / lock
    active=false;down=null;dragM=null;
  }
  document.addEventListener('pointerdown',onDown,{passive:false});
  document.addEventListener('pointermove',onMove,{passive:false});
  document.addEventListener('pointerup',onUp);
})();
function sendCorners(){const r=$('cimg').getBoundingClientRect();
  const corners=[...document.querySelectorAll('.cmark')].map(m=>{const b=m.getBoundingClientRect();
    return [(b.left+b.width/2-r.left)/r.width,(b.top+b.height/2-r.top)/r.height]});  // fractions 0..1
  send({type:'calib.corners',corners});show('calib',false);$('report').textContent='registering…';}

function handle(m){
  if(m.type==='session.baselined'||m.type==='move.result'||m.type==='refreshed')show('refreshbtn',true);
  switch(m.type){
    case 'session.ready':
      camLinked=m.cameraLinked;
      $('tid').textContent=m.name||('Table '+(table||'').slice(0,6));
      if(m.pairToken&&!started&&!m.calibrated&&!m.cameraLinked){ // only when no camera is linked yet (else skip the QR)
        show('pair',true);$('paircode').textContent=m.pairToken;
        const qr=$('qr');qr.innerHTML='';                       // clear so reconnects don't stack QRs
        const link=location.origin+'/app/camera.html?pair='+m.pairToken;
        if(typeof QRCode!=='undefined')new QRCode(qr,{text:link,width:144,height:144});}
      break;
    case 'camera.linked': camLinked=true;show('pair',false);break;   // a camera joined -> drop the QR
    case 'assign':                                              // console assigned this device a role
      if(m.role==='clock'){table=m.table;localStorage.setItem('cm_table',table);started=false;
        show('setup',false);show('game',true);renderBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR');
        send({type:'table.join',tableToken:table});}
      else if(m.role==='camera'){location.href='camera.html?pair='+m.pair;}
      break;
    case 'state':                                               // refresh/reconnect -> restore the view
      {const lm=(m.moves||[]).slice(-1)[0];lastMove=lm&&lm.uci?{from:lm.uci.slice(0,2),to:lm.uci.slice(2,4)}:null;}
      renderBoard(m.fen);
      showUndo(!!(m.moves&&m.moves.length));   // resume: clear illegal flag; undo if any moves
      if(m.result){phase='over';clk.running=false;show('pair',false);show('calib',false);show('startov',false);
        showCtrls(false);show('resetbtn',true);showUndo(false);paint();           // resumed game-over -> Reset stays available
        $('report').textContent='game over · '+m.result;$('report').className='report over';
        const w=m.result==='1-0'?'white':(m.result==='0-1'?'black':null);if(w)$('s-'+w).classList.add('win');}
      else if(m.calibrated||(m.moves&&m.moves.length)){         // calibrated -> resume (skip QR / recalibration)
        started=true;show('pair',false);show('calib',false);show('refreshbtn',true);
        const last=(m.moves||[]).slice(-1)[0];                  // restore the clocks from the last move
        if(last){if(last.clock_white!=null)clk.white=last.clock_white;if(last.clock_black!=null)clk.black=last.clock_black;}
        clk.active=m.turn.toLowerCase();
        if(m.moves&&m.moves.length){phase='run';clk.running=true;clk.last=Date.now();reading=false;warnMsg=null;
          show('startov',false);show('rotbtn',false);showCtrls(true);$('pausebtn').textContent='Pause';clearCands();paint();
          $('report').className='report';$('report').textContent=(camLinked?'':'reopen the camera — ')+m.turn+' to move';}
        else{enterReady();$('report').className='report';$('report').textContent='Ready — press START';}}
      else{$('report').textContent=m.turn+' to move';}
      break;
    case 'session.baselined':
      started=true;show('pair',false);show('calib',false);enterReady();
      $('report').className='report';$('report').textContent='Ready — press START';break;
    case 'calib.image': showCalib(m.image); break;
    case 'orient.ask': showOrient(); break;
    case 'calib.ok': show('calib',false);$('report').textContent='board registered — now capture the start position on the camera'; break;
    case 'calib.failed': show('calib',false);$('report').textContent='calibration: '+m.reason; break;
    case 'refreshed': $('report').textContent='board refreshed ✓ · '+(clk.active==='white'?'White':'Black')+' to move'; break;
    case 'move.result':
      started=true;clk.active=m.turn.toLowerCase();clk.running=true;clk.last=Date.now();
      if(m.uci)lastMove={from:m.uci.slice(0,2),to:m.uci.slice(2,4)};
      if(m.fen)renderBoard(m.fen);
      showUndo(true);                     // a legal move landed -> clear illegal flag, allow undo
      $('report').className='report';$('report').textContent=m.san+'  ·  '+m.turn+' to move';
      reading=false;warnMsg=null;clearCands();paint();break;
    case 'move.ambiguous': warnMsg="⚠ Couldn't read it — pick your move:";reading=false;showCands(m.candidates);paint();break;
    case 'move.unseen': warnMsg='⚠ No change seen — pick your move:';reading=false;showCands(m.candidates);paint();break;
    case 'move.unclear': case 'move.nochange':
      clk.running=true;clk.last=Date.now();reading=false;
      if(m.squares&&m.squares.length){markBad(m.squares);warnMsg='ILLEGAL MOVE\nTRY AGAIN';   // illegal: red squares + button text (two lines)
        $('report').className='report warn';$('report').textContent='⚠ illegal move';}
      else{markBad([]);warnMsg=(m.reason||'not recognized')+'\ntry again';
        $('report').className='report warn';$('report').textContent='⚠ '+(m.reason||'not recognized');}
      paint();break;
    case 'game.end':
      phase='over';clk.running=false;showCtrls(false);show('resetbtn',true);showUndo(false);clearCands();paint();
      $('report').textContent='game over · '+m.result;$('report').className='report over';
      const win=m.result==='1-0'?'white':(m.result==='0-1'?'black':null);
      if(win)$('s-'+win).classList.add('win');break;
    case 'error':
      if(/unknown table/.test(m.reason||'')){            // remembered table is gone (server restarted)
        localStorage.removeItem('cm_table');show('game',false);show('setup',true);$('tid').textContent='no table — start a new one';}
      else $('report').textContent='error: '+m.reason; break;
  }
}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}

function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');keepAwake();
    send({type:'hello',devId,devName,role:'clock',screen:{w:screen.width,h:screen.height,dpr:Math.round(devicePixelRatio*100)/100}});
    if(table)send({type:'table.join',tableToken:table})};
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
  ws.onmessage=e=>handle(JSON.parse(e.data));
}

$('cdone').onclick=sendCorners;
document.querySelectorAll('.obtn').forEach(b=>b.onclick=()=>{           // one-step: White's side -> orient
  send({type:'orient.pick',side:b.dataset.side});show('calib',false);$('report').textContent='orienting…'});
$('refreshbtn').onclick=()=>{send({type:'refresh'});$('report').textContent='re-reading the board…'};
$('undobtn').onclick=()=>{send({type:'game.undo'});$('report').textContent='taking back…'};
$('startov').onclick=startGame;$('pausebtn').onclick=togglePause;
$('resetbtn').onclick=()=>{if(confirm('Reset the game?\nMove all the pieces back to the start position first.'))resetGame()};
$('rotbtn').onclick=()=>{rotMode=(rotMode+1)%3;localStorage.setItem('cm_rot',rotMode);applyRot()};   // cycle 0->1->2
applyRot();

if(table){show('game',true);renderBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR');}
else{show('setup',true);$('tid').textContent='no table';}
connect();                                             // always connect so the server console sees the device
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
(function(){const bw=document.querySelector('.boardwrap'),cs=document.querySelector('.cstrip');   // col 2 spans exactly the board height
  if(bw&&cs&&window.ResizeObserver)new ResizeObserver(()=>{cs.style.height=Math.round(bw.getBoundingClientRect().height)+'px'}).observe(bw);})();

async function keepAwake(){try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen')}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){keepAwake();if(!ws||ws.readyState>1)connect()}});
document.addEventListener('click',keepAwake);
setInterval(()=>send({type:'ping'}),20000);            // heartbeat keeps the socket alive when idle
</script>
