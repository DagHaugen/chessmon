<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>games · chessmon</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;
    --accent:#4f8cff;--good:#3ecf8e;--bad:#ff6b6b;--cam:#ffb454}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:780px;margin:0 auto;padding:22px}
  .nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .nav a{color:var(--mut);text-decoration:none;font-size:13px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid transparent}
  .nav a:hover{background:var(--panel)}
  .nav a.here{color:var(--ink);background:var(--panel);border-color:var(--line)}
  .nav .dot{width:9px;height:9px;border-radius:50%;background:var(--bad);margin-left:auto}
  .nav .dot.on{background:var(--good)}
  h1{font-size:18px;margin:0 0 4px;font-weight:700}
  .lead{color:var(--mut);font-size:13px;margin:0 0 16px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .bar select{background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px;font-family:inherit}
  .bar .prim{background:var(--accent);color:#0b1020;border:none;border-radius:8px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;margin-left:auto}
  .empty{color:var(--mut);background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:20px;text-align:center;font-size:13px}
  .grow{display:flex;gap:12px;align-items:baseline;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 13px;margin-bottom:6px;cursor:pointer}
  .grow:hover{border-color:var(--accent)}
  .gnames{font-weight:600}
  .gres{font-weight:700;font-variant-numeric:tabular-nums}
  .gmeta{color:var(--mut);font-size:12px}
  .gtour{color:var(--mut);font-size:12px;margin-left:auto;white-space:nowrap}
  .gdate{color:var(--mut);font-size:12px;min-width:92px;text-align:right;white-space:nowrap}
  .modal{position:fixed;inset:0;background:rgba(8,10,14,.85);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px}
  .modal.hidden{display:none}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;max-width:660px;width:100%;max-height:92vh;overflow:auto}
  .ghead{font-size:15px;margin-bottom:12px}
  .ghmeta{display:block;color:var(--mut);font-size:12px;margin-top:3px}
  .replay{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .rboard{display:grid;grid-template-columns:repeat(8,1fr);width:min(360px,82vw);aspect-ratio:1;border:1px solid var(--line);border-radius:6px;overflow:hidden;flex:0 0 auto}
  .rsq{display:flex;align-items:center;justify-content:center;font-size:28px;line-height:1}
  .rsq.lt{background:#e8d2a8}.rsq.dk{background:#b07f53}
  .pc.w{color:#fcfcfc;text-shadow:0 0 1px #2a2a2a,0 1px 1px #2a2a2a}
  .pc.b{color:#161616}
  .rside{flex:1;min-width:170px}
  .rmoves{max-height:360px;overflow:auto;display:flex;flex-direction:column;gap:1px}
  .mrow{display:flex;gap:6px;font-size:14px;align-items:baseline}
  .mno{color:var(--mut);width:28px;text-align:right;flex:0 0 auto}
  .msan{cursor:pointer;padding:1px 6px;border-radius:5px;font-variant-numeric:tabular-nums}
  .msan:hover{background:rgba(255,255,255,.07)}
  .msan.on{background:var(--accent);color:#0b1020;font-weight:700}
  .rctl{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
  .rctl button{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer}
  .rctl .prim{background:var(--accent);color:#0b1020;border:none;font-weight:700}
  .rctl .bad{color:var(--bad)}
  .ridx{color:var(--mut);font-size:12px;font-variant-numeric:tabular-nums;min-width:56px;text-align:center}
  .rctl .sp{flex:1}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="admin.html" target="cm_console">Console</a>
    <a href="setup.html" target="cm_setup">Setup</a>
    <a href="players.html" target="cm_players">Players</a>
    <a href="formats.html" target="cm_formats">Formats</a>
    <a href="tournament.html" target="cm_tournament">Tournament</a>
    <a href="games.html" target="cm_games" class="here">Games</a>
    <a href="viewers.html" target="cm_live">Live</a>
    <span class="dot" id="dot" title="server link"></span>
  </nav>
  <h1>Games</h1>
  <p class="lead">Every finished game is archived here automatically. Click one to replay it; export PGN per game, per tournament, or all.</p>
  <div class="bar">
    <select id="filt"></select>
    <button class="prim" id="exp">Export PGN ↓</button>
  </div>
  <div id="glist"></div>
</div>
<div class="modal hidden" id="modal">
  <div class="sheet">
    <div class="ghead" id="ghead"></div>
    <div class="replay">
      <div class="rboard" id="rboard"></div>
      <div class="rside"><div class="rmoves" id="rmoves"></div></div>
    </div>
    <div class="rctl">
      <button id="cfirst" title="Start">⏮</button><button id="cprev" title="Previous">◀</button>
      <span class="ridx" id="ridx">0 / 0</span>
      <button id="cnext" title="Next">▶</button><button id="clast" title="End">⏭</button>
      <span class="sp"></span>
      <button class="prim" id="cexport">Export PGN</button>
      <button class="bad" id="cdel">Delete</button>
      <button id="cclose">Close</button>
    </div>
  </div>
</div>
<script>
function $(id){return document.getElementById(id)}
window.name='cm_games';
const START='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
const G={p:'♟',n:'♞',b:'♝',r:'♜',q:'♛',k:'♚'};
let ws, list=[], filt='', cur=null, idx=0, pendingPgn='', CMSET={};   // CMSET: global display prefs (time/date format) from the server
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');send({type:'admin.join'});send({type:'games.list'})};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='games'){list=m.games||[];renderList();}
    else if(m.type==='game'){cur=m.game;idx=0;if(cur)openModal();}
    else if(m.type==='games_pgn'){if(m.pgn)downloadPgn(m.pgn,pendingPgn||'chessmon.pgn');}
    else if(m.type==='games_changed'){send({type:'games.list'});}
    else if(m.type==='devices'){if(m.settings)CMSET=m.settings;if(list.length)renderList();}   // grab display prefs; re-render dates if they changed
  };
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function safe(s){return String(s||'').replace(/[^\w-]+/g,'_').replace(/^_+|_+$/g,'')||'game'}
function fmtRes(r){return r==='1-0'?'1–0':r==='0-1'?'0–1':r==='1/2-1/2'?'½–½':(r||'*');}
function fmtDate(ts){if(!ts)return '';const d=new Date(ts*1000),p=n=>String(n).padStart(2,'0');
  if(CMSET.date_format==='iso')   // 2026-06-27 13:11 (ISO is always 24h)
    return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:CMSET.time_format==='12h'});}
function gmeta(g){return esc(g.format||'')+(g.variant==='chess960'?' · Chess960'+(g.chess960!=null?' #'+g.chess960:''):'');}
function gtour(g){return g.tournament_name?esc(g.tournament_name)+(g.round!=null?' · R'+(g.round+1):''):'';}
function tourMap(){const s={};list.forEach(g=>{if(g.tournament)s[g.tournament]=g.tournament_name||'Tournament';});return s;}
function renderBar(){const sel=$('filt'),ts=tourMap();
  sel.innerHTML='<option value="">All games</option>'+Object.keys(ts).sort((a,b)=>ts[a].localeCompare(ts[b]))
    .map(id=>'<option value="'+esc(id)+'"'+(id===filt?' selected':'')+'>'+esc(ts[id])+'</option>').join('');}
function renderList(){
  renderBar();
  const L=$('glist');L.innerHTML='';
  const rows=list.filter(g=>!filt||g.tournament===filt).slice().sort((a,b)=>(b.finished_at||0)-(a.finished_at||0));
  if(!rows.length){L.innerHTML='<div class="empty">No games archived yet — finished games land here automatically.</div>';return;}
  rows.forEach(g=>{const row=document.createElement('div');row.className='grow';
    row.innerHTML='<span class="gnames">'+esc(g.white||'White')+' – '+esc(g.black||'Black')+'</span>'
      +'<span class="gres">'+fmtRes(g.result)+'</span><span class="gmeta">'+gmeta(g)+'</span>'
      +'<span class="gtour">'+gtour(g)+'</span><span class="gdate">'+fmtDate(g.finished_at)+'</span>';
    row.onclick=()=>send({type:'games.get',id:g.id});
    L.append(row);});
}
function positions(){const ps=[cur.start_fen||START];(cur.moves||[]).forEach(mv=>ps.push(mv.fen||ps[ps.length-1]));return ps;}
function renderBoard(fen){
  const place=(fen||START).split(' ')[0],grid=$('rboard');grid.innerHTML='';
  place.split('/').forEach((row,r)=>{let f=0;for(const ch of row){
    if(ch>='1'&&ch<='8'){for(let k=0;k<+ch;k++){sq(grid,r,f);f++;}}else{sq(grid,r,f,ch);f++;}}});
}
function sq(grid,r,f,piece){const d=document.createElement('div');d.className='rsq '+((r+f)%2?'dk':'lt');
  if(piece){const sp=document.createElement('span');sp.className='pc '+(piece===piece.toUpperCase()?'w':'b');sp.textContent=G[piece.toLowerCase()]||'';d.append(sp);}
  grid.append(d);}
function openModal(){
  const g=cur;
  $('ghead').innerHTML='<b>'+esc(g.white||'White')+'</b> – <b>'+esc(g.black||'Black')+'</b> &nbsp;'+fmtRes(g.result)
    +'<span class="ghmeta">'+gmeta(g)+(gtour(g)?' · '+gtour(g):'')+' · '+esc(fmtDate(g.finished_at))+'</span>';
  renderMoves();renderAt();
  $('modal').classList.remove('hidden');
}
function closeModal(){$('modal').classList.add('hidden');cur=null;}
function renderMoves(){
  const M=$('rmoves');M.innerHTML='';const mv=cur.moves||[];
  if(!mv.length){M.innerHTML='<div class="empty">No moves recorded.</div>';return;}
  for(let i=0;i<mv.length;i+=2){
    const row=document.createElement('div');row.className='mrow';
    const no=document.createElement('span');no.className='mno';no.textContent=(i/2+1)+'.';row.append(no);
    const w=document.createElement('span');w.className='msan';w.textContent=mv[i].san||'?';w.onclick=()=>{idx=i+1;renderAt();};row.append(w);
    if(mv[i+1]){const b=document.createElement('span');b.className='msan';b.textContent=mv[i+1].san||'?';b.onclick=()=>{idx=i+2;renderAt();};row.append(b);}
    M.append(row);
  }
}
function renderAt(){
  const ps=positions();idx=Math.max(0,Math.min(ps.length-1,idx));
  renderBoard(ps[idx]);$('ridx').textContent=idx+' / '+(ps.length-1);
  const sans=$('rmoves').querySelectorAll('.msan');
  sans.forEach((el,i)=>el.classList.toggle('on',i===idx-1));
  if(idx>0&&sans[idx-1])sans[idx-1].scrollIntoView({block:'nearest'});
}
function nav(d){const ps=positions();if(d==='f')idx=0;else if(d==='l')idx=ps.length-1;else idx+=d;renderAt();}
function downloadPgn(pgn,name){const blob=new Blob([pgn],{type:'application/x-chess-pgn'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.append(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);}
$('filt').onchange=()=>{filt=$('filt').value;renderList();};
$('exp').onclick=()=>{const tid=$('filt').value;
  pendingPgn=tid?safe($('filt').selectedOptions[0].textContent)+'.pgn':'chessmon-games.pgn';
  send({type:'games.pgn',tournament:tid||null});};
$('cfirst').onclick=()=>nav('f');$('cprev').onclick=()=>nav(-1);$('cnext').onclick=()=>nav(1);$('clast').onclick=()=>nav('l');
$('cclose').onclick=closeModal;
$('cexport').onclick=()=>{if(!cur)return;pendingPgn=safe((cur.white||'w')+'-'+(cur.black||'b'))+'.pgn';send({type:'games.pgn',id:cur.id});};
$('cdel').onclick=()=>{if(cur&&confirm('Delete this game from the archive?')){send({type:'games.delete',id:cur.id});closeModal();}};
$('modal').onclick=e=>{if(e.target===$('modal'))closeModal();};
document.addEventListener('keydown',e=>{
  if($('modal').classList.contains('hidden'))return;
  if(e.key==='Escape')closeModal();else if(e.key==='ArrowLeft')nav(-1);else if(e.key==='ArrowRight')nav(1);
  else if(e.key==='Home')nav('f');else if(e.key==='End')nav('l');
});
connect();
</script>
</body>
</html>
