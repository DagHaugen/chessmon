<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>setup · chessmon</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;
    --accent:#4f8cff;--good:#3ecf8e;--bad:#ff6b6b;--cam:#ffb454}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:22px}
  .nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .nav a{color:var(--mut);text-decoration:none;font-size:13px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid transparent}
  .nav a:hover{background:var(--panel)}
  .nav a.here{color:var(--ink);background:var(--panel);border-color:var(--line)}
  .nav .dot{width:9px;height:9px;border-radius:50%;background:var(--bad);margin-left:auto}
  .nav .dot.on{background:var(--good)}
  h1{font-size:18px;margin:0 0 4px;font-weight:700}
  .lead{color:var(--mut);font-size:13px;margin:0 0 16px}
  .tcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
  .thead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .tname{font-weight:700;font-size:16px}
  .msum{font-size:12.5px;color:var(--good)}
  .msum.none{color:var(--mut)}
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
  .field label{display:block;font-size:11px;color:var(--mut);margin-bottom:4px}
  .field select{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-size:14px;font-family:inherit}
  .startlabel{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-size:14px;color:var(--mut)}
  .sacts{display:flex;gap:8px;margin-top:12px}
  .add{background:var(--accent);color:#0b1020;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:9px 14px;font-size:13px;cursor:pointer}
  .empty{color:var(--mut);background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;font-size:13px;line-height:1.5}
  .radios{margin-left:auto;align-self:center;display:flex;gap:16px}
  .radios label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
  .frow960{display:flex;gap:14px;align-items:flex-start;margin-top:12px}
  .frow960.hidden{display:none}
  .frow960 .field{flex:none;width:150px}
  .mini{width:180px;height:180px;flex:0 0 auto;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .mini .sq{display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;color:#1a1a1a}
  .mini .sq.l{background:#fff}.mini .sq.d{background:#d9d9d9}
  .mini .pc{width:88%;height:88%;display:block}
  .ck{display:flex;align-items:center;gap:9px;font-size:14px;cursor:pointer;flex-wrap:wrap}
  .ck input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .ck small{flex-basis:100%;color:var(--mut);font-size:12px;margin:2px 0 0 25px}
  .ckrow{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
  .sfstat{font-size:12.5px;color:var(--mut)}.sfstat.ok{color:var(--good)}
  #prefs .dlbtn{background:var(--cam);color:#0b1020;border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="admin.html" target="cm_console">Console</a>
    <a href="setup.html" target="cm_setup" class="here">Setup</a>
    <a href="players.html" target="cm_players">Players</a>
    <a href="formats.html" target="cm_formats">Formats</a>
    <a href="tournament.html" target="cm_tournament">Tournament</a>
    <a href="games.html" target="cm_games">Games</a>
    <span class="dot" id="dot" title="server link"></span>
  </nav>
  <h1>Setup</h1>
  <div class="tcard" id="prefs">
    <div class="tname" style="margin-bottom:12px">Display &amp; engine</div>
    <div class="sgrid">
      <div class="field"><label>Time format</label>
        <select id="set_time"><option value="24h">24-hour · 16:54</option><option value="12h">12-hour · 4:54 PM</option></select></div>
      <div class="field"><label>Date format</label>
        <select id="set_date"><option value="iso">2026-06-27 13:11</option><option value="long">Jun 27 01:11 PM</option></select></div>
    </div>
    <div class="ckrow">
      <label class="ck"><input type="checkbox" id="set_suggest"> Show suggested moves to viewers</label>
      <span class="sfstat" id="sf_stat"></span>
      <button class="dlbtn" id="sf_dl" style="display:none">Get Stockfish</button>
    </div>
    <label class="ck" style="margin-top:14px"><input type="checkbox" id="set_bc_local"> Broadcast on the local network
      <small>Anyone on this Wi‑Fi can watch the live games on the viewers page.</small></label>
    <label class="ck" style="margin-top:12px"><input type="checkbox" id="set_bc_web"> Broadcast to the web
      <small id="bc_web_note">Relays games to chessmon‑cloud for public viewing.</small></label>
  </div>
  <p class="lead">Assign two players and a time control to each table. Names and the clock then follow on the table's clock.</p>
  <div id="list"></div>
</div>
<script>
function $(id){return document.getElementById(id)}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target&&e.target.tagName==='INPUT')e.target.blur();});
window.name='cm_setup';   // claim this tab's name so the nav's target= links reuse it
let ws, tables=[], players=[], formats=[], lastSig='';
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');send({type:'admin.join'})};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='devices'){tables=m.tables||[];players=m.players||[];formats=m.formats||[];applySettings(m.settings);maybeRender();}
    else if(m.type==='tables'){tables=m.tables||[];maybeRender();}};   // match.set broadcasts 'tables' -> refresh the summary (sig guard ignores move-only changes)
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function maybeRender(){   // only rebuild when the things we show actually change, so in-progress selects survive battery/online pings
  const sig=JSON.stringify([tables.map(t=>[t.token,t.name,t.match]),players.map(p=>[p.id,p.name]),formats.map(f=>[f.id,f.name])]);
  if(sig===lastSig)return; lastSig=sig; render();
}
function playerSelect(selId){const s=document.createElement('select');
  s.innerHTML='<option value="">—</option>'+players.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''))
    .map(p=>'<option value="'+esc(p.id)+'"'+(p.id===selId?' selected':'')+'>'+esc(p.name||'')+'</option>').join('');
  return s;}
function formatSelect(selId){const s=document.createElement('select');
  s.innerHTML='<option value="">—</option>'+formats.slice().sort((a,b)=>(a.base_ms-b.base_ms)||(a.increment_ms-b.increment_ms))
    .map(f=>'<option value="'+esc(f.id)+'"'+(f.id===selId?' selected':'')+'>'+esc(f.name||'')+(f.category?' · '+esc(f.category):'')+'</option>').join('');
  return s;}
function field(label,el){const d=document.createElement('div');d.className='field';const l=document.createElement('label');l.textContent=label;d.append(l,el);return d;}
function matchSummary(m){const w=m.white?m.white.name:'?',b=m.black?m.black.name:'?',f=m.format?m.format.name:'—';return w+' – '+b+' · '+f+(m.variant==='chess960'?' · Chess960 #'+(m.chess960!=null?m.chess960:'?'):'')+' · '+(m.start_mode||'manual');}
const KRN=['NNRKR','NRNKR','NRKNR','NRKRN','RNNKR','RNKNR','RNKRN','RKNNR','RKNRN','RKRNN'];
function chess960Backrank(n){n=((n%960)+960)%960;const b='........'.split('');   // Scharnagl scheme; 518 = standard RNBQKBNR
  b[[1,3,5,7][n%4]]='B';n=Math.floor(n/4);b[[0,2,4,6][n%4]]='B';n=Math.floor(n/4);
  let e=[];for(let i=0;i<8;i++)if(b[i]==='.')e.push(i);b[e[n%6]]='Q';n=Math.floor(n/6);
  e=[];for(let i=0;i<8;i++)if(b[i]==='.')e.push(i);const k=KRN[n];for(let i=0;i<5;i++)b[e[i]]=k[i];return b.join('');}
function chess960Fen(n){const r=chess960Backrank(n);return r.toLowerCase()+'/pppppppp/8/8/8/8/PPPPPPPP/'+r+' w KQkq - 0 1';}
const GLYPH={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
function mkGSq(r,c,ch){const d=document.createElement('div');d.className='sq '+((r+c)%2?'d':'l');
  if(ch){const i=document.createElement('img');i.className='pc';i.alt=ch;i.onerror=()=>{i.remove();d.textContent=GLYPH[ch]};i.src='pieces/'+(ch<'a'?'w':'b')+ch.toUpperCase()+'.svg';d.appendChild(i);}return d;}
function renderMini(b,fen){b.innerHTML='';(fen||'8/8/8/8/8/8/8/8').split(' ')[0].split('/').forEach((row,r)=>{let c=0;for(const ch of row){if(/\d/.test(ch)){for(let i=0;i<+ch;i++)b.appendChild(mkGSq(r,c++,''));}else b.appendChild(mkGSq(r,c++,ch));}});}
function render(){
  const L=$('list');L.innerHTML='';
  if(!tables.length){L.innerHTML='<div class="empty">No tables yet.<br>Create tables in the <b>Console</b> first, then assign players here.</div>';return}
  tables.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(t=>{
    const card=document.createElement('div');card.className='tcard';
    const head=document.createElement('div');head.className='thead';
    head.innerHTML='<span class="tname">'+esc(t.name||'unnamed table')+'</span>'+
      (t.match?'<span class="msum">'+esc(matchSummary(t.match))+'</span>':'<span class="msum none">not set</span>');
    const msumEl=head.querySelector('.msum');
    const grid=document.createElement('div');grid.className='sgrid';
    const wsel=playerSelect(t.match&&t.match.white&&t.match.white.id);
    const bsel=playerSelect(t.match&&t.match.black&&t.match.black.id);
    const fsel=formatSelect(t.match&&t.match.format&&t.match.format.id);
    const startEl=document.createElement('div');startEl.className='startlabel';startEl.textContent='Manual';
    grid.append(field('White',wsel),field('Black',bsel),field('Format',fsel),field('Start',startEl));
    const isF=!!(t.match&&t.match.variant==='chess960');                 // Standard vs Fischer Random (chess960)
    const radios=document.createElement('div');radios.className='radios';
    const stdR=document.createElement('input'),fisR=document.createElement('input');
    stdR.type=fisR.type='radio';stdR.name=fisR.name='var_'+t.token;stdR.checked=!isF;fisR.checked=isF;
    const stdL=document.createElement('label'),fisL=document.createElement('label');
    stdL.append(stdR,document.createTextNode(' Standard'));fisL.append(fisR,document.createTextNode(' Fischer'));
    radios.append(stdL,fisL);head.append(radios);                        // radios live on the header line
    const fRow=document.createElement('div');fRow.className='frow960'+(isF?'':' hidden');
    const numIn=document.createElement('input');numIn.type='number';numIn.min=0;numIn.max=959;
    numIn.value=(t.match&&t.match.chess960!=null)?t.match.chess960:518;
    const prev=document.createElement('div');prev.className='mini';
    const num960=()=>((+numIn.value||0)%960+960)%960;
    const refreshPrev=()=>renderMini(prev,chess960Fen(num960()));
    const liveSummary=()=>{const w=players.find(p=>p.id===wsel.value),b=players.find(p=>p.id===bsel.value),f=formats.find(x=>x.id===fsel.value);
      if(!w&&!b&&!f){msumEl.textContent='not set';msumEl.className='msum none';return;}
      msumEl.className='msum';msumEl.textContent=(w?w.name:'?')+' – '+(b?b.name:'?')+' · '+(f?f.name:'—')+(fisR.checked?' · Chess960 #'+num960():'')+' · manual';};
    const dirty=()=>{const m=t.match,w=wsel.value||null,b=bsel.value||null,f=fsel.value||null,f960=fisR.checked,n=num960();
      if(!m)return !!(w||b||f);
      return w!==(m.white?m.white.id:null)||b!==(m.black?m.black.id:null)||f!==(m.format?m.format.id:null)||f960!==(m.variant==='chess960')||(f960&&n!==m.chess960);};
    refreshPrev();
    fRow.append(field('Position # (0–959)',numIn),prev);
    const acts=document.createElement('div');acts.className='sacts';
    const setb=document.createElement('button');setb.className='add';setb.textContent=t.match?'Update':'Set';
    const onEdit=()=>{liveSummary();setb.style.display=(t.match&&!dirty())?'none':'';};   // live summary + hide Set/Update when nothing changed
    wsel.onchange=bsel.onchange=fsel.onchange=onEdit;
    numIn.oninput=()=>{refreshPrev();onEdit();};
    stdR.onchange=fisR.onchange=()=>{const f=fisR.checked;fRow.classList.toggle('hidden',!f);if(f)refreshPrev();onEdit();};
    onEdit();
    setb.onclick=()=>{
      const w=players.find(p=>p.id===wsel.value),b=players.find(p=>p.id===bsel.value),f=formats.find(x=>x.id===fsel.value);
      const f960=fisR.checked,n=num960();
      send({type:'match.set',table:t.token,match:{white:w?{id:w.id,name:w.name}:null,black:b?{id:b.id,name:b.name}:null,format:f||null,start_mode:'manual',
        variant:f960?'chess960':'standard',chess960:f960?n:null,start_fen:f960?chess960Fen(n):null}});
    };
    acts.append(setb);
    if(t.match){const clrb=document.createElement('button');clrb.className='ghost';clrb.textContent='Clear';
      clrb.onclick=()=>{if(confirm('Clear the assignment on “'+(t.name||'this table')+'”?'))send({type:'match.set',table:t.token,match:null})};
      acts.append(clrb);}
    card.append(head,grid,fRow,acts);L.appendChild(card);
  });
}
function show(id,on){$(id).style.display=on?'':'none'}
function applySettings(s){if(!s)return;
  $('set_time').value=s.time_format||'24h'; $('set_date').value=s.date_format||'iso';
  $('set_suggest').checked=!!s.show_suggested_moves;
  $('set_bc_local').checked=!!s.broadcast_local; $('set_bc_web').checked=!!s.broadcast_web;
  const cloud=!!s.cloud_configured; $('set_bc_web').disabled=!cloud;
  $('bc_web_note').textContent=cloud?'Relays games to chessmon‑cloud for public viewing.':'Set up chessmon‑cloud (cloud.json) first to enable web broadcast.';
  const inst=!!s.stockfish_installed;
  $('sf_stat').textContent=inst?'✓ Stockfish ready':'Stockfish not installed';
  $('sf_stat').className='sfstat'+(inst?' ok':'');
  $('set_suggest').disabled=!inst; show('sf_dl',!inst);}
$('set_time').onchange=()=>send({type:'settings.update',time_format:$('set_time').value});
$('set_date').onchange=()=>send({type:'settings.update',date_format:$('set_date').value});
$('set_suggest').onchange=()=>send({type:'settings.update',show_suggested_moves:$('set_suggest').checked});
$('set_bc_local').onchange=()=>send({type:'settings.update',broadcast_local:$('set_bc_local').checked});
$('set_bc_web').onchange=()=>send({type:'settings.update',broadcast_web:$('set_bc_web').checked});
$('sf_dl').onclick=()=>window.open('https://stockfishchess.org/download/','_blank');
connect();
</script>
</body>
</html>
