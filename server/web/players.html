<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>players · chessmon</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;
    --accent:#4f8cff;--good:#3ecf8e;--bad:#ff6b6b;--cam:#ffb454}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:22px}
  .nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .nav a{color:var(--mut);text-decoration:none;font-size:13px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid transparent}
  .nav a:hover{background:var(--panel)}
  .nav a.here{color:var(--ink);background:var(--panel);border-color:var(--line)}
  .nav .dot{width:9px;height:9px;border-radius:50%;background:var(--bad);margin-left:auto}
  .nav .dot.on{background:var(--good)}
  h1{font-size:18px;margin:0 0 4px;font-weight:700}
  .lead{color:var(--mut);font-size:13px;margin:0 0 16px}
  .addwrap{position:relative;margin-bottom:16px}
  .addrow{display:flex;gap:8px}
  .addrow input{flex:1;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:15px;font-family:inherit}
  .add{background:var(--accent);color:#0b1020;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
  .sug{position:absolute;left:0;right:0;top:100%;margin-top:5px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow-y:auto;max-height:340px;z-index:20;box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .sug:empty{display:none}
  .sugrow{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line)}
  .sugrow:last-child{border-bottom:none}
  .sugrow:hover{background:rgba(255,255,255,.06)}
  .sugname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
  .sugmeta{color:var(--mut);font-size:12px;white-space:nowrap}
  .sugmeta.ft{color:var(--cam);font-weight:700}
  .sugrate{font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
  .plist{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;flex-direction:column;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 11px}
  .ptop{display:flex;gap:10px;align-items:center}
  .pname{flex:1;min-width:0;background:var(--bg);color:var(--ink);border:1px solid transparent;border-radius:8px;padding:8px 10px;font-size:15px;font-weight:600;font-family:inherit}
  .pname:focus{border-color:var(--line);outline:none}
  .pfull{background:var(--bg);color:var(--mut);border:1px solid transparent;border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit}
  .pfull:focus{border-color:var(--line);outline:none;color:var(--ink)}
  .iinfo{flex:0 0 auto;background:none;border:none;color:var(--accent);font-size:17px;line-height:1;cursor:pointer;padding:0 2px}
  .iinfo:hover{color:var(--ink)}
  .fbadge{display:inline-flex;gap:7px;align-items:center;font-size:12px;white-space:nowrap}
  .fbadge .ft{color:var(--cam);font-weight:700}
  .fbadge .fr{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
  .fbadge .ff{color:var(--mut)}
  .mini{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer}
  .mini.bad{color:var(--bad)}
  .fmodal{position:fixed;inset:0;background:rgba(8,10,14,.82);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
  .fmodal.hidden{display:none}
  .fbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:320px;width:100%}
  .fttl{font-size:16px;font-weight:700;margin-bottom:12px}
  .frow{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);font-size:14px}
  .frow:last-of-type{border-bottom:none}
  .frow span{color:var(--mut)}
  .frow b{font-variant-numeric:tabular-nums}
  .flink{display:inline-block;margin-top:14px;color:var(--accent);text-decoration:none;font-weight:600;font-size:13px}
  .fclose{display:block;width:100%;margin-top:12px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px;font-size:14px;cursor:pointer}
  .empty{color:var(--mut);background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;font-size:13px}
</style>
<script src="nav.js"></script>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="admin.html" target="cm_console">Console</a>
    <a href="setup.html" target="cm_setup">Setup</a>
    <a href="players.html" target="cm_players" class="here">Players</a>
    <a href="formats.html" target="cm_formats">Formats</a>
    <a href="tournament.html" target="cm_tournament">Tournament</a>
    <a href="games.html" target="cm_games">Games</a>
    <a href="viewers.html" target="cm_live">Live</a>
    <a href="monitor.html" target="cm_monitor">Monitor</a>
    <span class="dot" id="dot" title="server link"></span>
  </nav>
  <h1>Players</h1>
  <p class="lead">The roster. Names show on the clock and in the console.</p>
  <div class="addwrap">
    <div class="addrow"><input id="newname" maxlength="40" placeholder="New player — or search FIDE by surname / ID" autocomplete="off"><button class="add" id="addbtn">+ Add</button></div>
    <div class="sug" id="sug"></div>
  </div>
  <div class="plist" id="list"></div>
</div>
<div class="fmodal hidden" id="fmodal"><div class="fbox" id="fbox"></div></div>
<script>
function $(id){return document.getElementById(id)}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target&&e.target.tagName==='INPUT')e.target.blur();});
window.name='cm_players';   // claim this tab's name so the nav's target= links reuse it
let ws, players=[], renderPending=false, fideOn=false, fideTimer=null;
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');send({type:'admin.join'})};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='devices'){players=m.players||[];if(m.settings)fideOn=!!m.settings.fide_installed;render();}
    else if(m.type==='fide.results'){if(m.q===$('newname').value.trim())renderSug(m.results||[]);}};
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function uid(){return crypto.randomUUID?crypto.randomUUID():('p_'+Math.random().toString(36).slice(2)+Date.now())}
function render(){
  if(document.activeElement&&document.activeElement.classList&&(document.activeElement.classList.contains('pname')||document.activeElement.classList.contains('pfull'))){renderPending=true;return}
  renderPending=false;
  const L=$('list');L.innerHTML='';
  if(!players.length){L.innerHTML='<div class="empty">No players yet — add some above.</div>';return}
  players.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(p=>{
    const row=document.createElement('div');row.className='prow';
    const top=document.createElement('div');top.className='ptop';
    const inp=document.createElement('input');inp.className='pname';inp.value=p.name||'';inp.maxLength=40;inp.placeholder='Display name';
    inp.onchange=()=>{const v=inp.value.trim();if(v)send({type:'players.save',player:Object.assign({},p,{name:v})});else inp.value=p.name||'';};   // display name (shown on the clock / console)
    inp.onblur=()=>{if(renderPending)render()};
    top.append(inp);
    if(p.fide_id){const b=document.createElement('span');b.className='fbadge';
      b.innerHTML=(p.title?'<span class="ft">'+esc(p.title)+'</span>':'')+(p.rating?'<span class="fr">'+p.rating+'</span>':'')+(p.fed?'<span class="ff">'+esc(p.fed)+'</span>':'');
      top.append(b);
      const info=document.createElement('button');info.className='iinfo';info.title='FIDE details';info.textContent='ⓘ';info.onclick=()=>showFide(p);
      top.append(info);}
    const del=document.createElement('button');del.className='mini bad';del.textContent='Delete';
    del.onclick=()=>{if(confirm('Remove “'+(p.name||'')+'”?'))send({type:'players.delete',id:p.id})};
    top.append(del);row.append(top);
    const full=document.createElement('input');full.className='pfull';full.value=p.full_name||'';full.maxLength=60;full.placeholder='Full name (formal · for PGN)';
    full.onchange=()=>{send({type:'players.save',player:Object.assign({},p,{full_name:full.value.trim()})});};
    full.onblur=()=>{if(renderPending)render()};
    row.append(full);L.appendChild(row);
  });
}
function addPlayer(){const v=$('newname').value.trim();if(!v)return;send({type:'players.save',player:{id:uid(),name:v,full_name:v}});$('newname').value='';$('newname').focus();}
$('addbtn').onclick=addPlayer;
$('newname').onkeydown=e=>{if(e.key==='Enter'){e.stopPropagation();addPlayer();}else if(e.key==='Escape')clearSug();};   // Enter adds + keeps focus (bypass the global blur)
// --- FIDE lookup (live, as you type; needs the FIDE list downloaded on the Setup page) ---
function clearSug(){$('sug').innerHTML='';}
function renderSug(rs){const S=$('sug');S.innerHTML='';
  rs.forEach(r=>{const row=document.createElement('div');row.className='sugrow';
    row.innerHTML='<span class="sugname">'+esc(r.name)+'</span>'
      +(r.title?'<span class="sugmeta ft">'+esc(r.title)+'</span>':'')
      +(r.rating?'<span class="sugrate">'+r.rating+'</span>':'')
      +'<span class="sugmeta">'+esc(r.country||'')+'</span>';
    row.onmousedown=e=>{e.preventDefault();addFromFide(r);};   // mousedown fires before the input's blur, so the pick isn't lost
    S.append(row);});
}
function addFromFide(r){var disp=r.name||'',c=disp.indexOf(', ');if(c>0)disp=disp.slice(c+2)+' '+disp.slice(0,c);   // "Last, First" -> "First Last" for the display name; full name keeps the FIDE form
  send({type:'players.save',player:{id:uid(),name:disp,full_name:r.name,fide_id:r.fideid,title:r.title||'',rating:r.rating||null,rapid:r.rapid||null,blitz:r.blitz||null,fed:r.country||'',born:r.born||null}});
  $('newname').value='';clearSug();$('newname').focus();}
$('newname').oninput=()=>{const v=$('newname').value.trim();clearTimeout(fideTimer);
  if(!fideOn||v.length<2){clearSug();return;}
  fideTimer=setTimeout(()=>send({type:'fide.lookup',q:v}),250);};
$('newname').addEventListener('blur',()=>setTimeout(clearSug,200));
// --- FIDE details popover (ⓘ on a row with a FIDE id; uses the snapshot stored when the player was added) ---
function showFide(p){
  $('fbox').innerHTML='<div class="fttl">'+esc(p.full_name||p.name||'')+'</div>'
    +'<div class="frow"><span>FIDE ID</span><b>'+esc(p.fide_id)+'</b></div>'
    +(p.title?'<div class="frow"><span>Title</span><b>'+esc(p.title)+'</b></div>':'')
    +'<div class="frow"><span>Federation</span><b>'+esc(p.fed||'—')+'</b></div>'
    +'<div class="frow"><span>Standard</span><b>'+(p.rating||'—')+'</b></div>'
    +'<div class="frow"><span>Rapid</span><b>'+(p.rapid||'—')+'</b></div>'
    +'<div class="frow"><span>Blitz</span><b>'+(p.blitz||'—')+'</b></div>'
    +(p.born?'<div class="frow"><span>Born</span><b>'+esc(p.born)+'</b></div>':'')
    +'<a class="flink" href="https://ratings.fide.com/profile/'+encodeURIComponent(p.fide_id)+'" target="_blank" rel="noopener">View on FIDE ↗</a>'
    +'<button class="fclose" id="fclose">Close</button>';
  $('fclose').onclick=closeFide;$('fmodal').classList.remove('hidden');
}
function closeFide(){$('fmodal').classList.add('hidden');}
$('fmodal').onclick=e=>{if(e.target===$('fmodal'))closeFide();};
connect();
</script>
</body>
</html>
