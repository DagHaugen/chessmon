<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<title>chessmon</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;
    --accent:#4f8cff;--good:#3ecf8e;--bad:#ff6b6b}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .wrap{max-width:380px;width:100%}
  .logo{font-size:20px;font-weight:800;letter-spacing:.02em;margin-bottom:22px}
  .logo .on{color:var(--good)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px 22px}
  .ring{width:54px;height:54px;margin:0 auto 18px;border-radius:50%;border:3px solid var(--line);
    border-top-color:var(--accent);animation:spin 1s linear infinite}
  .appicon{width:72px;height:72px;margin:0 auto 18px;display:none}     /* the chessmon mark — shown once registered */
  .card.ready .ring{display:none}                                      /* registered: hide the spinner... */
  .card.ready .appicon{display:block}                                  /* ...and show the icon */
  @keyframes spin{to{transform:rotate(360deg)}}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--good);display:inline-block;vertical-align:middle;margin-right:6px}
  h1{font-size:18px;margin:0 0 6px}
  .msg{font-size:13.5px;color:var(--mut);margin:0 0 18px;line-height:1.5}
  .dev{border-top:1px solid var(--line);padding-top:16px;margin-top:4px;display:none}   /* device controls — shown once registered */
  .card.ready .dev{display:block}
  .btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .dbtn{background:#11141a;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .dbtn:disabled{color:var(--mut);cursor:default}
  .dbtn.on{border-color:var(--good);color:var(--good)}
  .hidden{display:none}
  .camnote{font-size:12px;color:var(--mut);margin-top:11px;line-height:1.45;display:none}
  .nameinp{width:100%;background:#11141a;border:1px solid var(--line);color:var(--ink);border-radius:9px;
    padding:9px 11px;font-size:14px;text-align:center}
  .nameinp:focus{outline:none;border-color:var(--accent)}
  .did{font-size:12px;color:var(--mut);font-family:ui-monospace,monospace;margin-top:9px}
  .hint{font-size:12px;color:var(--mut);margin:16px 0 0;line-height:1.5}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">chess<span class="on">mon</span></div>
    <div class="card" id="card">
      <div class="ring"></div>
      <img src="icon.svg" class="appicon" alt="chessmon" width="72" height="72">
      <h1 id="title">Connecting…</h1>
      <p class="msg" id="msg">Reaching the chessmon server.</p>
      <div class="dev">
        <div class="btns" id="btns">
          <button class="dbtn" id="editbtn">Edit name</button>
          <button class="dbtn" id="flashbtn">Flash: off</button>
        </div>
        <input id="nameinp" class="nameinp hidden" placeholder="Name this device — e.g. Table 1 clock" maxlength="28" autocomplete="off">
        <div class="camnote" id="camnote"></div>
        <div class="did" id="did"></div>
      </div>
    </div>
  </div>
<script>
function $(id){return document.getElementById(id)}
let devId=localStorage.getItem('cm_devid');                 // a stable per-device id (shared with clock/camera)
if(!devId){devId=(crypto.randomUUID&&crypto.randomUUID())||('d'+Date.now().toString(36)+Math.random().toString(36).slice(2));localStorage.setItem('cm_devid',devId)}
function deviceName(){const u=navigator.userAgent;
  if(/iPhone/.test(u))return'iPhone';
  if(/iPad/.test(u)||(/Macintosh/.test(u)&&navigator.maxTouchPoints>1))return'iPad';
  if(/Android/.test(u))return/Mobile/.test(u)?'Android phone':'Android tablet';
  if(/Macintosh/.test(u))return'Mac';if(/Windows/.test(u))return'Windows PC';return'device'}
const devName=deviceName();
$('nameinp').value=localStorage.getItem('cm_devname')||'';   // a friendly name the operator can set right here
$('did').textContent=devName+' · '+devId.slice(0,6);          // "New device" is added back only if the server says it's unknown (welcome)
$('nameinp').onchange=()=>{const v=$('nameinp').value.trim();localStorage.setItem('cm_devname',v);
  if(ws&&ws.readyState===1){ws.send(JSON.stringify({type:'device.rename',devId,userName:v}));showConnected();}};  // reflect the new name in the title
$('nameinp').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('nameinp').blur();}});  // phone: Enter closes the keyboard (no form to submit)
$('editbtn').onclick=()=>{$('nameinp').classList.remove('hidden');$('btns').classList.add('hidden');$('nameinp').focus();};   // reveal the input to rename
$('nameinp').onblur=()=>{$('nameinp').classList.add('hidden');$('btns').classList.remove('hidden');};                          // done editing -> back to the buttons

let flashTrack=null,flashOn=false;                          // toggle this device's own torch
function setCamNote(t){const n=$('camnote');n.textContent=t||'';n.style.display=t?'block':'none';}
const PRIME='Flash uses the camera — the browser will ask permission the first time.';
const BLOCKED='Camera access is blocked. Refresh the page to allow it and try again.';
async function toggleFlash(){
  const b=$('flashbtn');
  try{
    if(flashOn){if(flashTrack){flashTrack.stop();flashTrack=null;}flashOn=false;b.textContent='Flash: off';b.classList.remove('on');return;}
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
    flashTrack=s.getVideoTracks()[0];setCamNote('');                                                       // allowed -> drop the explanation
    const caps=flashTrack.getCapabilities?flashTrack.getCapabilities():{};
    if(!caps.torch){flashTrack.stop();flashTrack=null;b.textContent='No flash';b.disabled=true;setCamNote('This camera has no flashlight.');return;}   // e.g. iOS Safari / front camera
    await flashTrack.applyConstraints({advanced:[{torch:true}]});
    flashOn=true;b.textContent='Flash: on';b.classList.add('on');
  }catch(e){if(flashTrack){flashTrack.stop();flashTrack=null;}flashOn=false;b.textContent='Camera blocked';b.disabled=true;setCamNote(BLOCKED);}
}
$('flashbtn').onclick=toggleFlash;
(function camPerm(){                                         // reflect camera permission: explain before the ask, clear once allowed, hint to refresh if blocked
  function explain(){if(!flashOn)setCamNote(PRIME);}
  try{navigator.permissions.query({name:'camera'}).then(p=>{
    const upd=()=>{const b=$('flashbtn');
      if(p.state==='granted'){if(b.disabled&&b.textContent==='Camera blocked'){b.textContent='Flash: off';b.disabled=false;}if(!flashOn)setCamNote('');}
      else if(p.state==='denied'){b.textContent='Camera blocked';b.disabled=true;setCamNote(BLOCKED);}
      else explain();};                                     // 'prompt'
    upd();p.onchange=upd;}).catch(explain);}catch(e){explain();}   // no permission API (Safari) -> just explain up front
})();

let ws;
function showConnected(){                                    // connected + waiting: show the device's name and the next step
  const nm=(localStorage.getItem('cm_devname')||'').trim();
  $('title').innerHTML='<span class="dot"></span>';$('title').appendChild(document.createTextNode(nm||'Connected'));   // text node = no HTML injection, works on old browsers
  $('msg').innerHTML='Connected — waiting to be set up. On the chessmon console it’s under <b>Unused devices</b>; add it to a table as a <b>camera</b> or a <b>clock</b>.';
}
function ready(){
  $('card').classList.add('ready');
  showConnected();
}
let battMgr=null;
function pushBattery(){if(battMgr&&ws&&ws.readyState===1)ws.send(JSON.stringify({type:'device.meta',battery:{level:Math.round(battMgr.level*100),charging:battMgr.charging}}))}
function setupBattery(){if(!navigator.getBattery)return;navigator.getBattery().then(b=>{battMgr=b;b.addEventListener('levelchange',pushBattery);b.addEventListener('chargingchange',pushBattery);pushBattery()}).catch(()=>{})}  // iOS Safari has no getBattery
setupBattery();
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws');
  ws.onopen=()=>{
    ready();
    ws.send(JSON.stringify({type:'hello',devId,name:devName,plat:navigator.platform,landing:true,
      screen:{w:screen.width,h:screen.height,dpr:Math.round(devicePixelRatio*100)/100}}));
    pushBattery();
  };
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='welcome'){                                  // the server tells us what it already knows about this device
      const local=(localStorage.getItem('cm_devname')||'').trim();
      if(m.userName){$('nameinp').value=m.userName;localStorage.setItem('cm_devname',m.userName);}   // server has a name (e.g. set in the console) -> adopt it
      else if(local){ws.send(JSON.stringify({type:'device.rename',devId,userName:local}));}          // we have a local name the server lost -> push it up
      if(!m.known)$('did').textContent=devName+' · New device · '+devId.slice(0,6);                   // only an unrecognised device is flagged "New"
      showConnected();
    }
    else if(m.type==='name.updated'){                        // the console renamed this device -> reflect it live
      localStorage.setItem('cm_devname',m.userName||'');$('nameinp').value=m.userName||'';showConnected();
    }
    else if(m.type==='assign'){                              // the console gave this device a role -> go there
      if(m.role==='clock'&&m.table){location.href='clock.html?table='+m.table;}
      else if(m.role==='camera'&&m.pair){location.href='camera.html?pair='+m.pair;}
    }
  };
  ws.onclose=()=>{$('card').classList.remove('ready');$('title').textContent='Reconnecting…';
    $('msg').textContent='Lost the server — trying again.';setTimeout(connect,1500);};
}
connect();
setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'ping'}))},20000);
</script>
</body>
</html>
