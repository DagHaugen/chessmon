<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>camera · chessmon</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;--accent:#4f8cff;--good:#3ecf8e;--bad:#ff6b6b}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .page{max-width:480px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .top{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--bad)}.dot.on{background:var(--good)}
  .vwrap{position:relative;overflow:hidden;border-radius:12px;background:#000}
  video{width:100%;height:auto;display:block;transform-origin:center}
  .zoom{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mut)}
  .zoom input[type=range]{flex:1}
  .zoom .zv{min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
  .movechk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut);margin-top:10px;cursor:pointer}
  .movechk input{width:18px;height:18px}
  .hidden{display:none}
  .steps{display:flex;gap:8px}
  .btn{flex:1;appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer}
  .btn[disabled]{opacity:.4}
  .status{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:13px;text-align:center}
  .status.err{color:var(--bad)} .status.ok{color:var(--good)}
  .log{font-size:12px;color:var(--mut);font-family:ui-monospace,monospace;max-height:130px;overflow:auto;
    white-space:pre-wrap;background:#11141a;border:1px solid var(--line);border-radius:10px;padding:8px}
  .screenoff{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;color:#1b1b1b;font-size:13px}
  .screenoff.hidden{display:none}                     /* .hidden is defined earlier, so its display:none loses by source order -> force it here */
  body.preview #v{display:none}                        /* preview mockup: no live feed -> show a board-ish placeholder */
  body.preview .vwrap{background:repeating-conic-gradient(#363b45 0 25%,#2a2e36 0 50%) 0 0/38px 38px}
</style>
</head>
<body>
<div class="page">
  <div class="top"><span class="dot" id="dot"></span><span id="hdr">camera unit</span></div>
  <div class="vwrap"><video id="v" playsinline muted></video></div>
  <div class="zoom hidden" id="zoomrow"><span>Zoom</span>
    <input type="range" id="zoom" min="1" max="3" step="0.1" value="1">
    <span class="zv" id="zoomval">1.0×</span></div>
  <label class="movechk"><input type="checkbox" id="motionchk"> Detect movement</label>
  <div class="steps">
    <button class="btn" id="b-cal">Calibrate — board set up</button>
  </div>
  <div class="status" id="status">starting…</div>
  <div class="log" id="log"></div>
</div>
<canvas id="cv" style="display:none"></canvas>
<div class="screenoff hidden" id="screenoff" onclick="this.classList.add('hidden')">tap to wake the screen</div>
<script>/* old-browser guard (ES5 only -- must parse on Safari < 11, where rtc_transport.js's async/await cannot). The ?rtc / comlos.com flow needs WebRTC, which Safari only got in iOS 11; on an older device show a clear message instead of a silent "Connecting..." hang. */
(function(){
  if(!(/[?&]rtc=/.test(location.search)||window.CM_RTC))return;   // only the comlos/WebRTC flow can be "too old"
  function cmFull(html){
    if(window._cmOld)return; window._cmOld=1;
    var m=document.createElement('div');
    m.style.cssText='position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#11141a;color:#e8eaed;padding:16% 26px 0;text-align:center;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:17px;line-height:1.55;font-weight:600';
    m.innerHTML=html; (document.body||document.documentElement).appendChild(m);
  }
  var STANDALONE='<br><br>You can still use the <b>standalone chess clock</b>:<br><br><a href="https://comlos.com/clock" style="color:#4f8cff;font-weight:800;text-decoration:none">Open comlos.com/clock &rarr;</a>';
  window.cmTooOld=function(){ cmFull('This device is too old for the QR connection &mdash; it needs <b>iOS 11+</b> or Android Chrome.'+STANDALONE); };
  window.cmNoConnect=function(){ cmFull('Couldn\'t reach the club server.<br><br>Check that <b>chessmon is running</b> on the club PC and that this device has internet, then reload.'+STANDALONE); };
  function cmSeen(){ try{ return !!localStorage.getItem('cm_connected'); }catch(e){ return false; } }
  if(!window.RTCPeerConnection)window.cmTooOld();                 // no WebRTC API at all -> genuinely too old
  else if(!cmSeen())window.cmConnTimer=setTimeout(window.cmNoConnect,20000);   // ONLY on a device that has never connected: nothing in 20s -> show the help. Once it HAS connected, a reload/drop is handled by the in-app reconnect (no scary full-screen)
})();</script>
<script src="rtc_transport.js"></script>
<script>
let pair=new URLSearchParams(location.search).get('pair')||localStorage.getItem('cm_pair');
if(pair)localStorage.setItem('cm_pair',pair);            // reuse the last table on reopen — no rescan
let devId=localStorage.getItem('cm_devid');             // a stable per-device id for the server console
if(!devId){devId=(crypto.randomUUID&&crypto.randomUUID())||('d'+Date.now().toString(36)+Math.random().toString(36).slice(2));localStorage.setItem('cm_devid',devId)}
function deviceName(){const u=navigator.userAgent;
  if(/iPhone/.test(u))return'iPhone';
  if(/iPad/.test(u)||(/Macintosh/.test(u)&&navigator.maxTouchPoints>1))return'iPad';
  if(/Android/.test(u))return/Mobile/.test(u)?'Android phone':'Android tablet';
  if(/Macintosh/.test(u))return'Mac';if(/Windows/.test(u))return'Windows PC';return'device'}
const devName=deviceName();
const v=document.getElementById('v'),cv=document.getElementById('cv');
let ws;
function $(id){return document.getElementById(id)}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target&&e.target.tagName==='INPUT')e.target.blur();});   // Enter in any input -> drop focus / dismiss keyboard
function status(t,cls){const s=$('status');s.textContent=t;s.className='status'+(cls?' '+cls:'')}
function log(t){const l=$('log');l.textContent=(new Date().toLocaleTimeString()+'  '+t+'\n')+l.textContent}

const PREVIEW=/[?&]preview\b/.test(location.search);   // /app/camera.html?preview=1 -> resolution mockup for intern.html; no camera, no WS
async function startCam(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    status('this browser blocks the camera here — open the page over HTTPS',  'err');return}
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},
      width:{ideal:1280},height:{ideal:960}},audio:false});
    v.srcObject=s;await v.play();camTrack=s.getVideoTracks()[0];setupZoom(camTrack);
    status('camera ready — mount it straight down over the board')
  }catch(e){status('camera blocked: '+e.message+' — needs HTTPS (or localhost)','err')}
}
let zoom=1,zoomHW=false,zoomMin=1,zoomMax=3,camRes=null,camTrack=null,flashOn=false,screenOn=true;   // zoom factor + hardware-zoom flag/range; capture resolution; live video track; flash/screen state
function applyControl(what,on,value){                   // remote control from the console
  if(what==='zoom'){applyZoom(value);sendCamStatus();return}   // console set the zoom -> apply + report back
  if(what==='flash'){
    const caps=camTrack&&camTrack.getCapabilities?camTrack.getCapabilities():{};
    if(!camTrack||!caps.torch){log('no controllable torch on this camera');ctlAck('flash',on,false,'no torch (iOS Safari has none)');return}
    camTrack.applyConstraints({advanced:[{torch:!!on}]}).then(()=>{flashOn=!!on;log('flashlight '+(on?'on':'off'));ctlAck('flash',on,true)}).catch(e=>{log('flash failed: '+e.message);ctlAck('flash',on,false,e.message)});
  }else if(what==='screen'){
    $('screenoff').classList.toggle('hidden', !!on);screenOn=!!on;    // off -> black overlay (the camera keeps capturing behind it)
    log('screen '+(on?'on':'off'));ctlAck('screen',on,true);
  }
}
function ctlAck(what,on,ok,reason){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'camera.controlled',what,on,ok,reason:reason||''}))
}
function sendCamStatus(){if(!camTrack||!ws||ws.readyState!==1)return;const caps=camTrack.getCapabilities?camTrack.getCapabilities():{};   // report actual flash/screen state to the console on connect/link
  ws.send(JSON.stringify({type:'camera.status',flash:flashOn,flashAvail:!!caps.torch,screen:screenOn,zoom:+$('zoom').value,zoomMin,zoomMax}))}
let zoomSettle=Promise.resolve();                        // resolves once a pending hardware-zoom change has actually landed
function applyZoom(z){                                   // set zoom from the local slider OR the remote console -- clamped to range
  const sl=$('zoom');z=Math.max(zoomMin,Math.min(zoomMax,+z||zoomMin));sl.value=z;
  if(zoomHW&&camTrack)zoomSettle=camTrack.applyConstraints({advanced:[{zoom:z}]}).then(()=>new Promise(r=>setTimeout(r,90))).catch(()=>{});   // wait for the constraint + a couple frames
  else{zoom=z;v.style.transform='scale('+z+')';}                                        // digital: crop + scale (instant)
  $('zoomval').textContent=z.toFixed(1)+'×';
}
function setupZoom(track){
  const set=track.getSettings?track.getSettings():{};
  if(set.width){camRes={w:set.width,h:set.height};
    if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'device.meta',cam:camRes}))}
  const caps=track.getCapabilities?track.getCapabilities():{},sl=$('zoom');
  if(caps.zoom){zoomHW=true;zoomMin=caps.zoom.min;zoomMax=Math.min(5,caps.zoom.max);   // real camera zoom; cap the slider at 5x (hardware often reports ~10)
    sl.min=zoomMin;sl.max=zoomMax;sl.step=0.1;sl.value=Math.min((track.getSettings&&track.getSettings().zoom)||zoomMin,zoomMax);
    log('zoom: hardware '+zoomMin+'-'+caps.zoom.max+' (slider capped at '+zoomMax+')');
  }else{zoomHW=false;zoomMin=1;zoomMax=5;                                              // digital crop + scale, 1-5x
    sl.min=1;sl.max=5;sl.step=0.1;sl.value=1;
    log('zoom: digital (camera exposes no zoom control)');
  }
  sl.oninput=()=>applyZoom(+sl.value);
  $('zoomval').textContent=(+sl.value).toFixed(1)+'×';$('zoomrow').classList.remove('hidden');
  sendCamStatus();                                       // torch capability + zoom range now known -> tell the console
}
async function grab(){await zoomSettle;                                      // a pending zoom must land before we capture
  const vw=v.videoWidth||1280,vh=v.videoHeight||960;let cw=vw,ch=vh;
  if(window._cmRtc){const maxW=640;if(cw>maxW){ch=Math.round(ch*maxW/cw);cw=maxW;}}   // WebRTC: one frame must stay <=48KB -> downscale
  cv.width=cw;cv.height=ch;const sw=vw/zoom,sh=vh/zoom;                       // central crop for digital zoom
  cv.getContext('2d').drawImage(v,(vw-sw)/2,(vh-sh)/2,sw,sh,0,0,cw,ch);
  let q=window._cmRtc?0.6:0.85,b=await new Promise(res=>cv.toBlob(res,'image/jpeg',q));
  while(window._cmRtc&&b&&b.size>46000&&q>0.25){q-=0.15;b=await new Promise(res=>cv.toBlob(res,'image/jpeg',q));}   // squeeze under the channel limit
  return b}
async function sendCalib(step){const b=await grab();ws.send(JSON.stringify({type:'calib',step}));ws.send(b);log('sent '+step+' frame')}

$('b-cal').onclick=()=>sendCalib('corners');           // one-step: relay the set-up board to the clock

let battMgr=null;
function pushBattery(){if(battMgr&&ws&&ws.readyState===1)ws.send(JSON.stringify({type:'device.meta',battery:{level:Math.round(battMgr.level*100),charging:battMgr.charging}}))}
function setupBattery(){if(!navigator.getBattery)return;navigator.getBattery().then(b=>{battMgr=b;b.addEventListener('levelchange',pushBattery);b.addEventListener('chargingchange',pushBattery);pushBattery()}).catch(()=>{})}  // iOS Safari has no getBattery
setupBattery();
let lastMovedSig=0,motionSettleT=null,lastAcc=null;      // gyro + accelerometer -> nudge the console to refresh the calibration frame while the camera is being moved
function sendMoved(){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'camera.moved'}))}
function onMotion(e){
  let moving=false;
  const rr=e.rotationRate;                                                       // gyroscope (deg/s) -- absent on phones without a gyro
  if(rr&&Math.abs(rr.alpha||0)+Math.abs(rr.beta||0)+Math.abs(rr.gamma||0)>20)moving=true;
  const ag=e.accelerationIncludingGravity;                                       // accelerometer (m/s²) -- on every device; catches slides + gyro-less phones
  if(ag){if(lastAcc&&Math.abs(ag.x-lastAcc.x)+Math.abs(ag.y-lastAcc.y)+Math.abs(ag.z-lastAcc.z)>1.3)moving=true;
    lastAcc={x:ag.x||0,y:ag.y||0,z:ag.z||0};}
  if(moving){const now=Date.now();if(now-lastMovedSig>300){lastMovedSig=now;sendMoved()}   // throttle while moving
    clearTimeout(motionSettleT);motionSettleT=setTimeout(sendMoved,500);}                  // one more once it settles
}
function motionEnable(){lastAcc=null;window.addEventListener('devicemotion',onMotion);log('movement detection on')}
function motionDisable(){window.removeEventListener('devicemotion',onMotion);clearTimeout(motionSettleT);log('movement detection off')}
$('motionchk').onchange=()=>{                             // ticking the box is the user gesture iOS needs for the motion-permission prompt
  if(!$('motionchk').checked){motionDisable();return}
  if(typeof DeviceMotionEvent==='undefined'){log('no motion sensor on this device');$('motionchk').checked=false;return}
  if(DeviceMotionEvent.requestPermission){               // iOS 13+ : prompt on the first tick
    DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')motionEnable();else{$('motionchk').checked=false;log('motion permission denied')}}).catch(()=>{$('motionchk').checked=false});
  }else motionEnable();                                   // Android / older iOS: no gate
};
function connect(){
  ws=cmConnect('/ws');
  ws.onopen=()=>{try{localStorage.setItem('cm_connected','1')}catch(e){}$('dot').classList.add('on');pushBattery();
    ws.send(JSON.stringify({type:'hello',devId,name:devName,role:'camera',plat:navigator.platform,screen:{w:screen.width,h:screen.height,dpr:Math.round(devicePixelRatio*100)/100}}));
    if(camRes)ws.send(JSON.stringify({type:'device.meta',cam:camRes}));
    if(pair){ws.send(JSON.stringify({type:'pair.join',pairToken:pair}));log('paired, joining…')}else log('registered — waiting to be paired')};
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
  ws.onmessage=e=>{
    if(typeof e.data!=='string')return;
    const m=JSON.parse(e.data);
    if(m.type==='capture.req'){grab().then(b=>ws.send(b));log('move → frame sent');return}
    if(m.type==='calib.relayed'){status('frame sent — mark the board corners on the clock','ok')}
    else if(m.type==='orient.ask'){status('now tap which side White is on, on the clock','ok')}
    else if(m.type==='session.baselined'){status('calibrated · armed — a frame is sent on every move','ok')}
    else if(m.type==='assign'){if(m.role==='camera'){pair=m.pair;localStorage.setItem('cm_pair',pair);
      ws.send(JSON.stringify({type:'pair.join',pairToken:pair}));sendCamStatus();status('paired from the console','ok')}
      else if(m.role==='clock'){cmNav('clock.html?table='+m.table)}}
    else if(m.type==='unassigned'){localStorage.removeItem('cm_pair');cmNav('index.html')}  // pulled off its table -> back to landing
    else if(m.type==='camera.control'){applyControl(m.what,m.on,m.value)}                           // console: screen on/off, flashlight, zoom
    else if(m.type==='session.ready'){if(m.calibrated){$('b-empty').disabled=true;$('b-start').disabled=true;
      status('already calibrated · armed — a frame is sent on every move','ok')}
      else{status('camera ready — capture the empty board, then the start position')}}
    else if(m.type==='calib.failed'){status('calibration failed: '+m.reason,'err')}
    else if(m.type==='move.result'){log('move: '+m.san)}
    else{log(m.type+(m.reason?': '+m.reason:''))}
  };
}

if(PREVIEW){document.body.classList.add('preview');status('camera preview');}
else{
  startCam();connect();                                // always: register the device + show the preview
  if(!pair)status('camera ready — pair from the server console, or scan a QR');
}
</script>
</body>
</html>
