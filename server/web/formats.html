<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>chessmon · formats</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;
    --accent:#4f8cff;--good:#3ecf8e;--bad:#ff6b6b;--cam:#ffb454}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:22px}
  .nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .nav a{color:var(--mut);text-decoration:none;font-size:13px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid transparent}
  .nav a:hover{background:var(--panel)}
  .nav a.here{color:var(--ink);background:var(--panel);border-color:var(--line)}
  .nav .dot{width:9px;height:9px;border-radius:50%;background:var(--bad);margin-left:auto}
  .nav .dot.on{background:var(--good)}
  h1{font-size:18px;margin:0 0 4px;font-weight:700}
  .lead{color:var(--mut);font-size:13px;margin:0 0 16px;display:flex;align-items:center;gap:12px}
  .flist{display:flex;flex-direction:column;gap:8px}
  .frow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .fname{font-weight:700;font-size:15px}
  .ftag{font-size:11px;font-weight:700;color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin-left:8px}
  .fsub{font-size:12.5px;color:var(--mut);margin-top:3px}
  .acts{display:flex;gap:6px}
  .mini{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
  .mini.bad{color:var(--bad)}
  .add{background:var(--accent);color:#0b1020;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .empty{color:var(--mut);background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;font-size:13px}
  .editor{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  .editor.hidden{display:none}
  .editor h3{margin:0 0 12px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
  label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px}
  input,select{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-size:14px;font-family:inherit}
  .erow{display:flex;gap:8px;margin-top:14px}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:9px 14px;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="admin.html" target="cm_console">Console</a>
    <a href="setup.html" target="cm_setup">Setup</a>
    <a href="players.html" target="cm_players">Players</a>
    <a href="formats.html" target="cm_formats" class="here">Formats</a>
    <a href="tournament.html" target="cm_tournament">Tournament</a>
    <span class="dot" id="dot" title="server link"></span>
  </nav>
  <h1>Formats</h1>
  <p class="lead">Time controls for games.<button class="add" id="addbtn">+ New format</button></p>
  <div class="flist" id="list"></div>
  <div class="editor hidden" id="editor">
    <h3 id="etitle">New format</h3>
    <div class="grid">
      <div><label>Name</label><input id="f_name" maxlength="24" placeholder="e.g. 15+10"></div>
      <div><label>Base (minutes)</label><input id="f_base" type="number" min="0" step="1" value="5"></div>
      <div><label>Increment (seconds)</label><input id="f_inc" type="number" min="0" step="1" value="0"></div>
      <div><label>Type</label><select id="f_type"><option value="none">None (sudden death)</option><option value="fischer">Fischer (+ per move)</option><option value="delay">Delay</option></select></div>
      <div><label>Category</label><select id="f_cat"><option>Classical</option><option>Rapid</option><option>Blitz</option><option>Bullet</option></select></div>
      <div><label>Variant</label><select id="f_var"><option value="standard">Standard</option><option value="chess960">Chess960</option></select></div>
    </div>
    <div class="erow"><button class="add" id="savebtn">Save</button><button class="ghost" id="cancelbtn">Cancel</button></div>
  </div>
</div>
<script>
function $(id){return document.getElementById(id)}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target&&e.target.tagName==='INPUT')e.target.blur();});
window.name='cm_formats';   // claim this tab's name so the nav's target= links reuse it
let ws, formats=[], editId=null;
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');send({type:'admin.join'})};
  ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='devices'){formats=m.formats||[];render();}};
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtMs(ms){const m=Math.floor(ms/60000),s=Math.round((ms%60000)/1000);return s?(m+' min '+s+' s'):(m+' min')}
function deriveCat(baseMin,incSec){const t=baseMin+incSec;return t>=60?'Classical':t>10?'Rapid':t>2?'Blitz':'Bullet'}
function descOf(f){
  const inc=f.increment_ms?(' + '+Math.round(f.increment_ms/1000)+' s '+(f.inc_type==='delay'?'delay':'Fischer')):' · sudden death';
  return fmtMs(f.base_ms)+inc+(f.variant==='chess960'?' · Chess960':'');
}
function render(){
  const L=$('list');L.innerHTML='';
  if(!formats.length){L.innerHTML='<div class="empty">No formats yet — add one.</div>';return}
  formats.slice().sort((a,b)=>(a.base_ms-b.base_ms)||(a.increment_ms-b.increment_ms)).forEach(f=>{
    const row=document.createElement('div');row.className='frow';
    const left=document.createElement('div');
    left.innerHTML='<span class="fname">'+esc(f.name||'—')+'</span><span class="ftag">'+esc(f.category||'')+'</span><div class="fsub">'+esc(descOf(f))+'</div>';
    const acts=document.createElement('div');acts.className='acts';
    const ed=document.createElement('button');ed.className='mini';ed.textContent='Edit';ed.onclick=()=>openEditor(f);
    const del=document.createElement('button');del.className='mini bad';del.textContent='Delete';
    del.onclick=()=>{if(confirm('Delete format “'+(f.name||'')+'”?'))send({type:'formats.delete',id:f.id})};
    acts.append(ed,del);row.append(left,acts);L.appendChild(row);
  });
}
function openEditor(f){
  editId=f?f.id:null;
  $('etitle').textContent=f?'Edit format':'New format';
  $('f_name').value=f?(f.name||''):'';
  $('f_base').value=f?Math.round(f.base_ms/60000):5;
  $('f_inc').value=f?Math.round(f.increment_ms/1000):0;
  $('f_type').value=f?(f.inc_type||'none'):'none';
  $('f_cat').value=f?(f.category||'Blitz'):'Blitz';
  $('f_var').value=f?(f.variant||'standard'):'standard';
  $('editor').classList.remove('hidden');$('f_name').focus();
}
$('addbtn').onclick=()=>openEditor(null);
$('cancelbtn').onclick=()=>$('editor').classList.add('hidden');
$('f_base').oninput=$('f_inc').oninput=()=>{$('f_cat').value=deriveCat(+$('f_base').value||0,+$('f_inc').value||0)};
function uid(){return crypto.randomUUID?crypto.randomUUID():('f_'+Math.random().toString(36).slice(2)+Date.now())}
$('savebtn').onclick=()=>{
  const b=+$('f_base').value||0,i=+$('f_inc').value||0,type=$('f_type').value;
  const fmt={id:editId||uid(),name:$('f_name').value.trim()||(b+'+'+i),
    base_ms:Math.round(b*60000),increment_ms:Math.round(i*1000),
    inc_type:(i===0?'none':(type==='none'?'fischer':type)),category:$('f_cat').value,variant:$('f_var').value};
  send({type:'formats.save',format:fmt});$('editor').classList.add('hidden');
};
connect();
</script>
</body>
</html>
