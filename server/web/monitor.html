<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#15171c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>monitor · chessmon</title>
<style>
  :root{--bg:#15171c;--panel:#1d2026;--line:#2c313b;--ink:#e8eaed;--mut:#9aa3b2;--accent:#4f8cff;--good:#3ecf8e;--lt:#ebecd0;--dk:#6f8f5f}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;overflow:hidden}
  .bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .bar.hidden{display:none}
  .logo{font-weight:800;font-size:15px}
  .dot{width:9px;height:9px;border-radius:50%;background:#ff6b6b}.dot.on{background:var(--good)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
  .chip{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12.5px;cursor:pointer;white-space:nowrap;color:var(--mut)}
  .chip.on{border-color:var(--accent);color:var(--ink);background:#21252e}
  .chip .n{font-weight:700}
  .bbtn{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .stage{flex:1;display:grid;gap:10px;padding:10px;min-height:0}
  .stage.single{grid-template-columns:1fr;grid-template-rows:1fr}
  .stage.quad{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
  .empty{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:15px;text-align:center}
  .tile{display:flex;flex-direction:column;gap:5px;min-height:0;min-width:0}
  .pl{display:flex;justify-content:space-between;align-items:center;gap:10px;flex:none}
  .pl .nm{font-weight:700;font-size:clamp(12px,2.1vh,20px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl .ck{font-size:clamp(15px,3vh,30px);font-weight:800;font-variant-numeric:tabular-nums;color:var(--mut)}
  .pl.act .ck{color:var(--good)}
  .bwrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
  .board{height:100%;width:auto;aspect-ratio:1;max-width:100%;max-height:100%;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .sq{display:flex;align-items:center;justify-content:center}
  .sq.l{background:var(--lt)}.sq.d{background:var(--dk)}
  .sq img{width:86%;height:86%;display:block}
  .sq span{font-size:3.4vh;line-height:1}
  .sgs{display:flex;align-items:center;gap:8px;flex:none;font-size:clamp(11px,1.8vh,16px)}
  .sgs .sgmv{font-weight:700;color:var(--accent);white-space:nowrap}
  .sgs .wdl{flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden;border:1px solid var(--line)}
  .sgs .ww{background:#e9edf2}.sgs .wd{background:#6b7280}.sgs .wb{background:#262b36}
</style>
</head>
<body>
<div class="bar" id="bar">
  <span class="logo">chessmon</span><span class="dot" id="dot"></span>
  <div class="chips" id="chips"></div>
  <button class="bbtn" id="layout">2×2</button>
  <button class="bbtn" id="full">Fullscreen</button>
  <button class="bbtn" id="hide" title="Hide this bar — move the mouse to the top edge to bring it back">Hide bar</button>
</div>
<div class="stage quad" id="stage"></div>
<script>
function $(id){return document.getElementById(id)}
window.name='cm_monitor';
const G={p:'♟',n:'♞',b:'♝',r:'♜',q:'♛',k:'♚'};
let ws, games={}, order=[], sel=[], layout='quad';
try{const s=JSON.parse(localStorage.getItem('cm_monitor')||'{}');if(Array.isArray(s.sel))sel=s.sel;if(s.layout)layout=s.layout;}catch(e){}
function saveSel(){try{localStorage.setItem('cm_monitor',JSON.stringify({sel,layout}))}catch(e){}}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');send({type:'viewer.join'})};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='tables'){ingest(m.tables||[]);}
    else if(m.type==='broadcast_off'){order=[];games={};renderChips();renderStage();setTimeout(()=>send({type:'viewer.join'}),5000);}
    else if(m.type==='clock.tick'){const g=games[m.table];if(g){g.w=m.white_ms;g.b=m.black_ms;g.turn=(m.active==='black')?'b':'w';g.running=!!m.running;g.syncAt=performance.now();}}
    else if(m.type==='suggest'){const g=games[m.table];if(g){g.sug={moves:m.moves,wdl_white:m.wdl_white};renderStage();}}
    else if(m.type==='suggest_off'){Object.values(games).forEach(g=>g.sug=null);renderStage();}};
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
}
function baseMs(t){return t.match&&t.match.format?t.match.format.base_ms:null}
function names(t){const w=t.match&&t.match.white?t.match.white.name:'White',b=t.match&&t.match.black?t.match.black.name:'Black';return [w,b];}
function ingest(tabs){
  const run=tabs.filter(t=>(t.started_at||t.moves>0)&&!t.result);
  order=run.map(t=>t.token);
  run.forEach(t=>{const g=games[t.token]||(games[t.token]={moves:-1});g.t=t;
    const base=baseMs(t),cw=(t.clock_white!=null)?t.clock_white:base,cb=(t.clock_black!=null)?t.clock_black:base;
    if(t.moves!==g.moves){g.w=cw;g.b=cb;g.syncAt=performance.now();g.moves=t.moves;}
    g.turn=(t.fen.split(' ')[1]==='b')?'b':'w';g.running=(t.status!=='paused');});
  Object.keys(games).forEach(k=>{if(!order.includes(k))delete games[k];});
  sel=sel.filter(tok=>order.includes(tok));                          // drop finished games from the selection
  if(!sel.length&&order.length)sel=order.slice(0,layout==='single'?1:4);   // default selection
  renderChips();renderStage();
}
function live(g,side){let ms=side==='w'?g.w:g.b;if(ms==null)return null;
  if(g.running&&g.turn===side)ms-=(performance.now()-g.syncAt);return Math.max(0,ms);}
function fmtClk(ms){if(ms==null)return '–';const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60,p=n=>String(n).padStart(2,'0');
  return h>0?h+':'+p(m)+':'+p(ss):m+':'+p(ss);}
function renderChips(){const C=$('chips');C.innerHTML='';
  if(!order.length){C.innerHTML='<span style="color:var(--mut);font-size:12.5px">No games in progress</span>';return;}
  order.forEach(tok=>{const g=games[tok],t=g.t,nm=names(t);
    const chip=document.createElement('div');chip.className='chip'+(sel.includes(tok)?' on':'');
    chip.innerHTML='<span class="n">'+esc(nm[0])+'</span> – '+esc(nm[1]);
    chip.onclick=()=>toggle(tok);C.append(chip);});}
function toggle(tok){const i=sel.indexOf(tok);
  if(i>=0)sel.splice(i,1);
  else{sel.push(tok);const cap=layout==='single'?1:4;while(sel.length>cap)sel.shift();}
  saveSel();renderChips();renderStage();}
function renderStage(){const S=$('stage');S.className='stage '+layout;S.innerHTML='';
  const show=(layout==='single'?sel.slice(0,1):sel.slice(0,4));
  if(!show.length){const e=document.createElement('div');e.className='empty';e.textContent=order.length?'Pick a game from the bar above':'Waiting for a live game…';S.append(e);return;}
  show.forEach(tok=>{const g=games[tok];if(g)S.append(tile(g));});}
function tile(g){const t=g.t,nm=names(t);
  const el=document.createElement('div');el.className='tile';
  const top=document.createElement('div');top.className='pl'+(g.turn==='b'?' act':'');
  top.innerHTML='<span class="nm">'+esc(nm[1])+'</span><span class="ck" data-tok="'+esc(t.token)+'" data-side="b">'+fmtClk(live(g,'b'))+'</span>';
  const bw=document.createElement('div');bw.className='bwrap';const bd=document.createElement('div');bd.className='board';renderBoard(bd,t.fen);bw.append(bd);
  const bot=document.createElement('div');bot.className='pl'+(g.turn==='w'?' act':'');
  bot.innerHTML='<span class="nm">'+esc(nm[0])+'</span><span class="ck" data-tok="'+esc(t.token)+'" data-side="w">'+fmtClk(live(g,'w'))+'</span>';
  el.append(top,bw,bot);if(g.sug)el.append(sugStrip(g.sug));return el;}
function sugStrip(s){const d=document.createElement('div');d.className='sgs';
  const w=s.wdl_white,best=(s.moves&&s.moves[0])?s.moves[0].san:'–';let bar='';
  if(w){const t=(w[0]+w[1]+w[2])||1;
    bar='<span class="ww" style="width:'+(w[0]/t*100)+'%"></span><span class="wd" style="width:'+(w[1]/t*100)+'%"></span><span class="wb" style="width:'+(w[2]/t*100)+'%"></span>';}
  d.innerHTML='<span class="sgmv">'+esc(best)+'</span><span class="wdl">'+bar+'</span>';return d;}
function renderBoard(grid,fen){grid.innerHTML='';const place=(fen||'8/8/8/8/8/8/8/8').split(' ')[0];
  place.split('/').forEach((row,r)=>{let f=0;for(const ch of row){
    if(ch>='1'&&ch<='8'){for(let k=0;k<+ch;k++){sq(grid,r,f);f++;}}else{sq(grid,r,f,ch);f++;}}});}
function sq(grid,r,f,piece){const d=document.createElement('div');d.className='sq '+((r+f)%2?'d':'l');
  if(piece){const i=document.createElement('img');i.alt=piece;
    i.onerror=()=>{i.remove();const sp=document.createElement('span');sp.textContent=G[piece.toLowerCase()]||'';sp.style.color=(piece<'a')?'#fff':'#111';d.append(sp);};
    i.src='pieces/'+(piece<'a'?'w':'b')+piece.toUpperCase()+'.svg';d.append(i);}grid.append(d);}
$('layout').onclick=()=>{layout=(layout==='quad')?'single':'quad';$('layout').textContent=(layout==='quad')?'2×2':'Single';
  const cap=layout==='single'?1:4;if(sel.length>cap)sel=sel.slice(0,cap);saveSel();renderStage();};
$('full').onclick=()=>{const e=document.documentElement;
  if(!document.fullscreenElement){(e.requestFullscreen||e.webkitRequestFullscreen||function(){}).call(e);}
  else{(document.exitFullscreen||function(){}).call(document);}};
$('hide').onclick=()=>$('bar').classList.add('hidden');
document.addEventListener('mousemove',e=>{if(e.clientY<6)$('bar').classList.remove('hidden');});   // mouse to the top edge brings the bar back
$('layout').textContent=(layout==='quad')?'2×2':'Single';
setInterval(()=>{document.querySelectorAll('.ck[data-tok]').forEach(el=>{const g=games[el.dataset.tok];if(g)el.textContent=fmtClk(live(g,el.dataset.side));});},500);
connect();
</script>
</body>
</html>
