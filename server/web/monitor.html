<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#23272f">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="stylesheet" href="watchboard.css">
<title>monitor · chessmon</title>
<style>
  :root{--bg:#23272f;--panel:#2b3039;--line:#3a414e;--ink:#e8eaed;--mut:#9aa3b2;--accent:#4f8cff;--good:#3ecf8e;--lt:#ebecd0;--dk:#6f8f5f}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;overflow:hidden}
  .bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .bar.hidden{display:none}
  .logo{font-weight:800;font-size:15px}
  .dot{width:9px;height:9px;border-radius:50%;background:#ff6b6b}.dot.on{background:var(--good)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
  .chip{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12.5px;cursor:pointer;white-space:nowrap;color:var(--mut)}
  .chip.on{border-color:var(--accent);color:var(--ink);background:#21252e}
  .chip .n{font-weight:700}
  .bbtn{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .stage{flex:1;display:grid;gap:16px;padding:16px;min-height:0}
  .stage>.wb{border:1px solid var(--line);border-radius:12px;padding:10px;background:#20242c}   /* air + a line between tiles */
  .stage.n1{grid-template-columns:1fr}
  .stage.n2{grid-template-columns:1fr 1fr}
  .stage.n3{grid-template-columns:1fr 1fr 1fr}
  .stage.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
  .empty{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:15px;text-align:center}
</style>
</head>
<body>
<div class="bar" id="bar">
  <span class="logo">chessmon</span><span class="dot" id="dot"></span>
  <div class="chips" id="chips"></div>
  <button class="bbtn" id="full">Fullscreen</button>
  <button class="bbtn" id="hide" title="Hide this bar — move the mouse to the top edge to bring it back">Hide bar</button>
</div>
<div class="stage" id="stage"></div>
<script src="watchboard.js"></script>
<script>
function $(id){return document.getElementById(id)}
window.name='cm_monitor';
let ws, games={}, order=[], sel=[], boardEls=[];
const HACK=Math.min(4,Math.max(0,parseInt(location.search.slice(1))||0));   // monitor.html?2 / ?3 / ?4 -> duplicate the one live board into N tiles (testing layouts with a single game)
try{const s=JSON.parse(localStorage.getItem('cm_monitor')||'{}');if(Array.isArray(s.sel))sel=s.sel;}catch(e){}
function saveSel(){try{localStorage.setItem('cm_monitor',JSON.stringify({sel}))}catch(e){}}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function reportWatch(){send({type:'watch_set',tables:sel});}   // tell the server which games this monitor is showing
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>{$('dot').classList.add('on');send({type:'viewer.join'});reportWatch();};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='tables'){ingest(m.tables||[]);}
    else if(m.type==='broadcast_off'){order=[];games={};renderChips();renderStage();setTimeout(()=>send({type:'viewer.join'}),5000);}
    else if(m.type==='clock.tick'){const g=games[m.table];if(g){g.w=m.white_ms;g.b=m.black_ms;g.turn=(m.active==='black')?'b':'w';g.running=!!m.running;g.syncAt=performance.now();}}
    else if(m.type==='suggest'){const g=games[m.table];if(g){g.sug={moves:m.moves,wdl_white:m.wdl_white,fen:m.fen};boardEls.forEach(b=>{if(b.tok===m.table)cmUpdateSug(b.el,g);});}}
    else if(m.type==='suggest_off'){Object.values(games).forEach(g=>g.sug=null);boardEls.forEach(b=>{if(games[b.tok])cmUpdateSug(b.el,games[b.tok]);});}};
  ws.onclose=()=>{$('dot').classList.remove('on');setTimeout(connect,1500)};
}
function ingest(tabs){
  const run=tabs.filter(t=>(t.started_at||t.moves>0)&&!t.result);
  order=run.map(t=>t.token);
  run.forEach(t=>{const g=games[t.token]||(games[t.token]={moves:-1});g.t=t;
    const base=cmBaseMs(t),cw=(t.clock_white!=null)?t.clock_white:base,cb=(t.clock_black!=null)?t.clock_black:base;
    if(t.moves!==g.moves){g.w=cw;g.b=cb;g.syncAt=performance.now();g.moves=t.moves;}
    g.turn=(t.fen.split(' ')[1]==='b')?'b':'w';g.running=(t.status!=='paused');});
  Object.keys(games).forEach(k=>{if(!order.includes(k))delete games[k];});
  sel=sel.filter(tok=>order.includes(tok));                          // drop finished games from the selection
  if(!sel.length&&order.length)sel=order.slice(0,4);                 // default: up to 4
  reportWatch();renderChips();renderStage();
}
function renderChips(){const C=$('chips');C.innerHTML='';
  if(!order.length){C.innerHTML='<span style="color:var(--mut);font-size:12.5px">No games in progress</span>';return;}
  order.forEach(tok=>{const g=games[tok],nm=cmNames(g.t);
    const chip=document.createElement('div');chip.className='chip'+(sel.includes(tok)?' on':'');
    chip.innerHTML='<span class="n">'+cmEsc(nm[0])+'</span> – '+cmEsc(nm[1]);
    chip.onclick=()=>toggle(tok);C.append(chip);});}
function toggle(tok){const i=sel.indexOf(tok);
  if(i>=0)sel.splice(i,1);
  else{sel.push(tok);while(sel.length>4)sel.shift();}                // up to 4 boards; the count picks the layout
  saveSel();reportWatch();renderChips();renderStage();}
function renderStage(){const S=$('stage');boardEls=[];
  let show=sel.slice(0,4);
  if(HACK&&show.length)show=Array.from({length:HACK},(_,i)=>show[i%show.length]);   // ?N -> repeat the selection to N tiles
  const n=show.length;
  S.className='stage n'+n;S.innerHTML='';
  if(!n){const e=document.createElement('div');e.className='empty';e.textContent=order.length?'Pick a game from the bar above':'Waiting for a live game…';S.append(e);return;}
  const orient=(n===2||n===3)?'port':'land';                        // 1 & 4 -> landscape; 2 & 3 -> portrait
  show.forEach(tok=>{const g=games[tok];if(!g)return;const el=cmWatchBoard(g,orient);boardEls.push({tok,el});S.append(el);});
  boardEls.forEach(b=>cmFit(b.el));}                                 // size each landscape board to fit its tile
$('full').onclick=()=>{const e=document.documentElement;
  if(!document.fullscreenElement){(e.requestFullscreen||e.webkitRequestFullscreen||function(){}).call(e);}
  else{(document.exitFullscreen||function(){}).call(document);}};
$('hide').onclick=()=>$('bar').classList.add('hidden');
document.addEventListener('mousemove',e=>{if(e.clientY<6)$('bar').classList.remove('hidden');});   // mouse to the top edge brings the bar back
setInterval(()=>{boardEls.forEach(b=>{const g=games[b.tok];if(g)cmTickBoard(b.el,g);});},500);
window.addEventListener('resize',()=>boardEls.forEach(b=>cmFit(b.el)));
connect();
</script>
</body>
</html>
